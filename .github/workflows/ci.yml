name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (Super-Linter)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Super-Linter
        uses: github/super-linter@v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BRANCH: main
          VALIDATE_ALL_CODEBASE: false
          VALIDATE_CLANG_FORMAT: true
          VALIDATE_YAML: true
          VALIDATE_JSON: true
          VALIDATE_MARKDOWN: true

  build-and-test:
    name: Build and host tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache build outputs
        uses: actions/cache@v4
        with:
          path: |
            build
            out
            .cache
          key: ${{ runner.os }}-build-${{ hashFiles('Makefile', '**/*.mk', 'tools/scripts/check_deps.py') }}
          restore-keys: |
            ${{ runner.os }}-build-

      - name: Check dependencies
        run: python3 tools/scripts/check_deps.py

      - name: Build (x64)
        run: make all64

      - name: Run host tests
        run: make test

      - name: Upload test and build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-artifacts-${{ github.run_id }}
          path: |
            build
            out
            *.log
          if-no-files-found: ignore
