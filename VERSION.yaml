        summary: "Roll-back honesto de alpha.254 antes de avançar para Fase B da Etapa 4. Antes de invocar o workflow `cross-repo-contract-sync` para coordenar a publicação de `capy-ui-widget` v1 no sister `CapyUI`, descobri por inspeção do sister repo (que está disponível como sibling em `/Users/t808981/Desktop/PR/CapyUI/`) que a ABI `capy-ui-widget` já está publicada e em **v2.7** com **display-list schema v7** — muito além do que a matriz do CapyOS indicava (v0.6 legado). Discoveries específicas: (1) `CapyUI/VERSION` contém `2.7.0`, não `0.7.3`; (2) `CapyUI/docs/compatibility.md` declara `org.capyos.ui.widget-core` exportando ABI `capy-ui-widget` v2.7 (additive sobre 2.6; 1.x em LTS ≥1 ano) com 13 ondas de capabilities desde 0.0; (3) `CapyUI/src/widget/capy_display_list.h` define `CAPY_DISPLAY_LIST_SCHEMA_VERSION = 7u` e `enum capy_dl_op` com 12 opcodes (RECT, BORDER, TEXT, CLIP_PUSH, CLIP_POP, IMAGE_REF, FOCUS_RING, DIRTY_HINT, DPI_SCOPE, TRANSFORM_PUSH, TRANSFORM_POP, PLUGIN_OP) em layout struct nativo `capy_dl_cmd` (não byte-tagged); (4) sister já pinou CapyOS core em `0.8.0-alpha.244+20260520` (stale por mais de 10 alphas). Raiz do erro do alpha.254: tratei `capy-ui-widget` como ABI **owned pelo CapyOS**, mas o contrato cross-repo (`docs/reference/integration/capyui-widget-integration-contract.md`) deixa claro que **CapyUI é o owner** — CapyOS é apenas o consumer do display list. Inventei um schema paralelo + incompatível: magic bytes 'WIDC' (0x57494443), 7 opcodes (FILL_RECT=0x01, STROKE_RECT=0x02, DRAW_TEXT=0x03, DRAW_GLYPH=0x04, DRAW_IMAGE=0x05, PUSH_CLIP=0x06, POP_CLIP=0x07), wire format byte-tagged com tamanhos fixos por opcode — nada disso aparece no real `capy_display_list.h` que CapyUI publica. Caminho correto: o CapyOS-side adapter deve **consumir** `struct capy_display_list` diretamente (sister header includa via Makefile sibling detection, mesmo padrão usado para `gui/desktop/` em alpha.241), validar struct nativos contra o schema declarado em `dl->version`, e renderizar via compositor. Roll-back executado: removidos `include/gui/widget/widget_contract.h`, `include/gui/widget/widget_adapter.h`, `src/gui/widget/widget_contract.c`, `src/gui/widget/widget_adapter.c`, `tests/gui/test_widget_contract.c`, `docs/architecture/capy-ui-widget-v1-contract.md`, `docs/releases/capyos-0.8.0-alpha.254+20260521.md`. Diretórios `include/gui/widget/` e `src/gui/widget/` ficaram vazios e foram removidos via `rmdir`. Wiring revertido em Makefile (linha do bloco `KERNEL64_OBJS` removeu `widget_contract.o` + `widget_adapter.o`; linha do bloco TEST_SRCS removeu test file + 2 source files) e em `tests/test_runner.c` (-1 declaração `run_widget_contract_tests`, -1 chamada). Estado de Etapa 4 retorna ao ponto imediatamente após o fechamento da Etapa 3 (alpha.253): Fase A correta ainda a fazer com escopo redefinido (adapter consumer-side, não owner-side). Compatibilidade preservada: código de storage stack + USB HID + dbg->klog migration (alpha.245-253) permanece intacto; adaptador v0.6 in-tree (`include/gui/widget.h` + `src/gui/widgets/widget.c`) permanece intocado e é o caminho atual de produção desktop. **Pendência crítica documentada nesta janela mas não resolvida:** matriz cross-repo no CapyOS está stale — pina CapyUI 0.7.3 enquanto o sister real está em 2.7.0 com `capy-ui-widget` v2.7; sincronizar isso requer workflow `cross-repo-contract-sync` completo + novo audit em `docs/reference/integration/compatibility-audit-<date>.md` + bump das pinagens no sister repo — deferido para próxima sessão com direcionamento específico. Lição operacional para evitar reincidência: **antes** de começar Fase A de qualquer Etapa que abre cross-repo gate, ler o sister repo real (`../<sister>/VERSION` + `../<sister>/docs/compatibility.md` + headers ABI relevantes) **antes** de qualquer linha de código, não depois."
