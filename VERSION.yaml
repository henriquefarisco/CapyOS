        summary: "Higienizacao end-to-end do nucleo + wizard interativo de primeiro boot + comando capy unificado. (1) Sources de desktop session, window manager e apps (gui/desktop/*, gui/window/*, apps/*) migram para CapyUI (escopo expandido para 0.7.0): novo Makefile CapyUI publica DOIS modulos via make package - org.capyos.ui.widget-core (existente) + org.capyos.ui.desktop-session (novo, depends widget-core, empacota src/desktop+src/window+src/apps). Script tools/scripts/migrate_to_capyui.py automatiza a copia + stub de forwarding para o operador rodar fora desta maquina. Headers permanecem em CapyOS/include como contrato compartilhado. (2) Makefile CapyOS adiciona PROFILE flag (full|core-only) + CAPYUI_DIR autodetect via realpath ../CapyUI: build pattern rules capyui-desktop/, capyui-window/, capyui-apps/ compilam de CAPYUI_DIR quando presente, com fallback in-tree quando ausente; PROFILE=core-only zera DESKTOP_OBJS/WINDOW_OBJS/APPS_OBJS e define CAPYOS_PROFILE_CORE_ONLY. (3) Wizard expandido: include/services/capypkg_bootstrap.h ganha enum capypkg_bootstrap_event + typedef capypkg_bootstrap_progress_fn + capypkg_bootstrap_run_with_progress; src/services/install_profile.c ganha install_profile_format (round-trip parse/format, 4 testes novos no host runner); src/config/first_boot/modules.c novo TU implementa first_boot_module_selection_step com TUI BASIC|FULL|CUSTOM, escreve /system/install/profile.ini via install_profile_format, drives capypkg_bootstrap_run_with_progress com callback que renderiza [i/N] na fbcon, chama acpi_reboot ao terminar instalacao bem-sucedida (retorno 1 sinaliza reboot). program.c integra a etapa apos provisionamento do admin. (4) Activation gate: novo include/kernel/module_gate.h + src/kernel/module_gate.c implementa kernel_module_desktop_session_available() e kernel_module_widget_core_available() via stat de /var/capypkg/<name>/installed; extended.c wrappa ensure_desktop e cmd_desktop_start com gate + #ifndef CAPYOS_PROFILE_CORE_ONLY isola gui/desktop/apps headers. (5) Installer UEFI minimalista: src/boot/uefi_loader/installer_run.c retira ~310 linhas de prompts (language, keyboard, hostname, theme, splash, admin user/password, confirmacao com sumario) substituindo por declaracao de defaults + chave de recovery + confirmacao curta; boot_cfg.flags perde BOOT_CONFIG_FLAG_HAS_SETUP_DATA. (6) Comando capy unificado em src/shell/commands/system_control/capy_command.c: subcomandos install/module list/module status/wizard[--modules]/update/help tri-lingua; slot 39 do registry (count 40). (7) Silent provisioning em kernel_shell_runtime.c eliminado (~200 linhas removidas) - sempre delega ao wizard interativo agora; first_boot_setup_impl tambem simplificado. (8) Bump pinning CapyOS->0.8.0-alpha.241+20260519 e CapyUI->0.7.0 nos 7 repos + matrix. NAO inclui loader runtime de modulos (escopo Etapa 12+); desktop ainda linkado no kernel ELF quando PROFILE=full, gate apenas controla activation. NAO fecha Etapas 3-9 do roadmap oficial - este slice e estrutural/UX, nao avanca o gating de runtime."
      - version: 0.8.0-alpha.240+20260519
        date: 2026-05-19
        summary: "Extensao antecipatoria da Etapa 9 cobrindo o circuito end-to-end de instalacao modular: install profile + comando shell pkg-bootstrap + auto-bootstrap em kernel poll + ferramenta de empacotamento por repo externo + agregador de indice. Adiciona include/services/install_profile.h (contrato publico do /system/install/profile.ini com kinds BASIC|FULL|CUSTOM, alfabeto restrito do repo_name, HTTPS only no repo_url, parser fail-closed em ANSI escape) + src/services/install_profile.c (parser line-oriented key=value reusando a disciplina do update_agent/capypkg) + tests/services/test_install_profile.c com 15 casos cobrindo defaults, full valido, full sem repo, http rejeitado, custom com lista, custom sem lista, alfabeto, kind invalido, key desconhecida tolerada, linha malformada, ANSI escape, signed flag e labels. Adiciona include/services/capypkg_bootstrap.h + src/services/capypkg_bootstrap.c implementando capypkg_bootstrap_run(force, *installed, *failed) que e a ponte profile->capypkg: le profile via vfs, valida should_bootstrap, registra repo idempotente, fetch_index, itera available e chama capypkg_install em cada (ou subset bootstrap_install em CUSTOM), grava marker /system/install/bootstrap.done para no-op futuro, retorna ERR_STORAGE quando rede nao esta pronta (sem marker, retry no proximo poll). Novo comando capysh pkg-bootstrap [--force] (slot 38) tri-lingua reportando instalados/falhas; registrado em power_runtime_registry.c (38->39 slots) e exposto em system_control_internal.h. kernel_service_poll_capypkg em src/arch/x86_64/kernel_services.c agora chama kernel_capypkg_maybe_bootstrap() apos bind, idempotente, com supressao de spam no log; poll interval do SYSTEM_SERVICE_CAPYPKG reduzido de 3600s para 60s em kernel_main.c para permitir retry rapido durante warmup da rede. Adiciona system/install/profile.ini.sample documentando schema completo, defaults e failure modes. Adiciona tools/scripts/build_modules_index.py (host) que escaneia repos irmaos por build/capypkg/*.manifest (ou target/capypkg/* para CapyLang), valida campo a campo (alfabeto name, HTTPS payload_url, hex sha256, install_root scope, depends, payload_size <= 8MiB, printable ASCII em values) e agrega em build/capypkg/modules-index.txt; novo target make modules-index. Em cada um dos 6 repos externos (CapyAgent, CapyBrowser, CapyCodecs, CapyUI, CapyLang, CapyBenchmark) adiciona target make package que produz <canonical-name>-<version>.bin (tar ustar determinístico de src+docs+VERSION) + <canonical-name>.manifest (line-oriented), com PUBLISH_URL_BASE override e dependencias declaradas (CapyBrowser depende de org.capyos.codecs.image-basic). Documentacao: docs/operations/manual-module-deploy-runbook.md atualizado com secoes 1.1 (make package por repo), 1.2 (make modules-index e publish), 4.A (auto-bootstrap por profile) e 5.4 (equivalente profile para o caminho lab unsigned); CapyAgent/docs/capypkg-publisher-guide.md atualizado com workflow real do make package + PUBLISH_URL_BASE. NAO fecha a Etapa 9 (continua bloqueada por Etapas 3-8). NAO adiciona tela interativa de profile no first-boot wizard (escopo Etapa 8 explicitamente nao tocado). NAO altera capypkg core, audit trail ou contratos externos existentes — todos os simbolos novos sao aditivos. NAO altera a Etapa 3 oficialmente em andamento."
