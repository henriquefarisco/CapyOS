ing do contrato widget/display-list na Etapa 4 (este alpha cumpre essa condição no lado core). Próximo passo bloqueador: Fase B — sister `CapyUI` publica release que conforma com o contrato em `include/gui/widget/widget_contract.h`."
      - version: 0.8.0-alpha.253+20260521
        date: 2026-05-21
        summary: "Sub-slice 3E.4.B entregue (migração `dbg_*` -> `klog`/`klog_hex` em ahci.c e nvme.c): refactor mecânico de 108 call sites (~55 em `src/drivers/storage/ahci.c` + ~53 em `src/drivers/nvme/nvme.c`) substituindo o pattern legado `dbg_puts/dbg_hex32/dbg_hex64/dbg_putc/dbg_label_hex32` (que escrevia em port 0xE9, disponível apenas em QEMU/Bochs `-debugcon`) por `klog(level, msg)` / `klog_hex(level, prefix, value)` (que escreve em ring buffer em memória + persiste via logger service). Helpers locais file-static removidos de ambos os arquivos; novos `#include kernel/log/klog.h` adicionados. Categorias de nível aplicadas consistentemente: KLOG_INFO para init/probe/scan/sucesso (controller found, BAR0=, CAP_hi/lo, identify lba28/48, COMRESET ok, controller reset ok, I/O queues created, init complete), KLOG_WARN para transient/timeout/recoverable em hot path (command failed/aborted/timeout, port not idle, no SATA device ready, I/O cmd failed/timeout, read/write failed lba=), KLOG_ERROR para permanent/setup-failed/fatal-status (port stop/start timeout, identify failed, invalid ABAR, COMRESET no device/restart failed, port setup failed, controller fatal status, timeout waiting for ready, admin cmd failed/timeout, BAR0 is zero, reset CSTS still RDY, reset RDY never came back, failed to recreate I/O CQ/SQ, failed to create I/O CQ/SQ). Linhas compostas multi-campo (e.g., `[ahci] setup port X sig=Y ssts=Z cmd=W` em ahci_setup_port; `[ahci] command failed class=X is=Y tfd=Z`; `[nvme] found NVMe at bus:device.function`) foram quebradas em múltiplas chamadas klog (uma por campo, com prefixo descritivo) — trade-off explicito: perda da densidade da formatação de uma linha por evento, ganho de estrutura forense pesquisável e nível de severidade por campo. Bug latente corrigido como efeito colateral: nvme_controller_reset (entregue em alpha.248 / Slice 3E.2.B) tinha duas chamadas a `dbg_label_hex32` (linhas 570 e 583 do snapshot pre-migração) referenciando o helper static de ahci.c, ou seja, undefined-reference em escopo de TU. Provavelmente só não explodia o link porque o caminho de reset escalation é raramente exercitado em prod (só dispara após TIMEOUT em NVMe) e o linker pode estar tolerando referência não satisfeita em código morto. A migração resolve substituindo por `klog_hex` que está disponível via header. Confirmando dados empíricos do grep no resto do projeto: 13 arquivos adicionais usam o pattern `dbg_*` (storage_runtime.c=15 sites, efi_block.c=15, mount_initialize.c=14, chunk_wrapper.c=14, crypt_aes_xts.c=14, namespace_ops.c=13, offset_wrapper.c=10, buffer_cache.c=9, directory_entries.c=9, public_mount_api.c=4, format_mount.c=4, ramdisk.c=3, filesystem_helpers.c=2) totalizando ~126 sites adicionais que **NÃO foram migrados nesta sub-slice** — documentado como sub-slice 3E.4.C (follow-up). A migração foi focada nos hot paths de storage (AHCI + NVMe) porque eles são (a) o caminho crítico do gate externo 3E.5, (b) o código mais auditado nesta sessão, (c) os sites onde o bug latente do `dbg_label_hex32` existia. Arquivos tocados: `src/drivers/storage/ahci.c` (remove 27 linhas de helpers + adiciona include klog.h + 15 multi_edit substitutions cobrindo todos os 55 sites), `src/drivers/nvme/nvme.c` (remove 21 linhas de helpers + adiciona include klog.h + 19 multi_edit substitutions cobrindo todos os 53 sites). Sem mudanças em tests porque nem ahci.c nem nvme.c são linked no host runner (só builders e classifier que já estavam puros). Sem mudanças cross-repo: pure interno; nenhum manifest, ABI, versão pinada ou contrato de adapter mudou. Slice 3E.5 gate `smoke-x64-vmware-storage-resilience` permanece válido; o operador externo deve consumir a build alpha.253 e observar a auseˆncia de outputs em port 0xE9 (ántes capturado por QEMU `-debugcon`) e a presença equivalente em /var/log/capyos_klog.txt pós-boot ou via `klog_dump` em runtime. Próximo bloco: aguardar execução externa do gate de 3E.5 com build alpha.253; considerar sub-slice 3E.4.C (migração dos outros 13 arquivos) após feedback externo."
      - version: 0.8.0-alpha.252+20260521
        date: 2026-05-21
        summary: "Audit fix pós-Slice 3E.5: dois bugs críticos encontrados na revisão crítica de alphas 245–251 foram corrigidos antes da execução externa do gate. BUG #1 — storage smoke marker double-emission em VMs dual-storage: cada driver (AHCI/NVMe) carregava seu próprio `storage_smoke_state` file-scope, então uma VM com AHCI + NVMe ambos presentes emitia o marker `[smoke] storage-stack ready` duas vezes (uma por driver, na primeira completion OK de cada), violando o invariante documentado em `include/drivers/storage/storage_smoke.h:9-21` 'exactly once per boot'. O gate externo passava por coincidência (markers_in_order tolera repetição), mas parsers downstream e métricas de boot timing quebravam silenciosamente. Fix: movido o latch para um global single-source-of-truth em `src/drivers/storage/storage_smoke.c::g_global_state` (file-static), exposto via novo `storage_smoke_try_latch_global(source)` que retorna 1 exatamente uma vez no boot e 0 em qualquer chamada subsequente independente da source; + `storage_smoke_global_reset()` para isolamento de host tests. Drivers `ahci.c` e `nvme.c` consomem o latch global via `*_smoke_signal_ok()` helpers; os file-scope `g_ahci_smoke_state` e `g_nvme_smoke_state` foram removidos. BUG #2 — NVMe Controller Level Reset não recriava I/O queues: `nvme_controller_reset` (entregue em Slice 3E.2.B / alpha.248) toggava CC.EN=0 → CC.EN=1 e reseta phase/head/tail counters locais, mas não reemitia Create I/O Submission Queue / Create I/O Completion Queue. Per NVMe 2.0 §3.5.4 e 1.4 §7.3.1, após CC.EN=0 o controlador descarta TODAS as I/O queue mappings; as DRAM buffers (g_admin_sq/cq, g_io_sq/cq) sobrevivem mas a visão do controlador delas não. Consequência: após qualquer TIMEOUT em NVMe, o retry pendurava (controller sem I/O queue 1 mapeada), gerava segundo TIMEOUT, e a retry loop surfaceava PERMANENT — reset escalation path de NVMe era effectively non-functional, sempre queimava budget sem recuperar. O comentário antigo no código dizia literalmente 'we keep the same static buffers and only need to re-init the phase tracker' confundindo DRAM buffers com registração no controlador. Fix: após o re-prime de phase trackers em `nvme_controller_reset`, chama `nvme_create_io_cq(dev, 1)` e `nvme_create_io_sq(dev, 1, 1)` com early-return -1 se qualquer falhar (a retry loop então trata como TIMEOUT+reset_failed = PERMANENT, comportamento esperado pela `block_device_ops.reset` contract); comentário do código reescrito explicitando NVMe 2.0 §3.5.4 e a invariante de AQA preservation. Tests: 4 novos cases em `tests/drivers/test_storage_smoke_gate.c` (test_global_latch_ahci_then_nvme, test_global_latch_nvme_then_ahci, test_global_latch_reset_isolates_tests, test_global_latch_rejects_invalid_source) totalizando 13 cases no arquivo. BUG #2 não tem unit test direto (requer NVMe MMIO mock fora do escopo desta correção); a correção é coberta por inspeção estática + execução externa do gate `smoke-x64-vmware-storage-resilience` (Slice 3E.5). Headers tocados: `include/drivers/storage/storage_smoke.h` (+novo API). Implementações tocadas: `src/drivers/storage/storage_smoke.c` (+global state), `src/drivers/storage/ahci.c` (-state, simplifica helper), `src/drivers/nvme/nvme.c` (-state, simplifica helper, +queue re-create em reset). Stub host (`tests/stubs/stub_storage_smoke_io.c`) intacto. Zero coordenação cross-repo: pure interno; nenhum manifest, ABI, versão pinada ou contrato de adapter mudou. Slice 3E.5 gate `smoke-x64-vmware-storage-resilience` permanece válido; com os fixes, o operador externo deve observar exatamente um marker `[smoke] storage-stack ready` no COM1 mesmo em VMs com AHCI + NVMe. Próximo bloco: aguardar execução externa do gate de 3E.5 com a build alpha.252 para fechamento formal da Etapa 3."
