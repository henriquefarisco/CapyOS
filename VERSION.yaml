      - version: 0.8.0-alpha.264+20260607
        date: 2026-06-07
        summary: "FECHA a Etapa 5 (TLS userland real). A libcapy-tls userland passa a fazer handshake BearSSL real (capy_tls_is_supported()==1): SYS_GETRANDOM, SYS_CLOCK_REALTIME, trust anchors reais, ClientHello+SNI, handshake-drive, validacao X.509 fail-closed e o seam HTTPS de capy_net (capy_http_get sobre TLS). A flag CAPYOS_TLS_USERLAND_HANDSHAKE foi PROMOVIDA A DEFAULT no Makefile (USERLAND_CFLAGS; opt-out com =0) apos o gate externo passar: build flag-on + make smoke-x64-vmware-tls-handshake (marker '[smoke] tls-handshake ready' no COM1) + release-check. Hardening de seguranca na mesma janela, com testes host onde aplicavel: (1) ELF loader userland (elf_loader.c) - 3 overflows de integer nos bounds de program-header/segmento/vaddr, corrigidos via helpers overflow-safe (include/kernel/elf_bounds.h) + tests/kernel/test_elf_bounds.c; (2) ELF loader de boot (kernel_loader.c) - bounds de phdr-table + overflow de p_offset em load_kernel_from_buffer + guarda de wrap p_paddr+p_memsz nos dois loaders (arquivo normalizado p/ LF); (3) volume header - tetos de custo KDF (Argon2 t<=4096 / m<=1GiB, PBKDF2<=100M iters) contra DoS de mount pre-auth + 3 testes; (4) cobertura adversarial host nova p/ os parsers de RX de rede DNS, DHCP options, ICMP e ARP; (5) CAPYFS names_equal limitado ao campo fixo de 32 bytes. Abre a Etapa 6 (apps basicos do desktop maduros + CapyBrowse Text). Validacao externa (make test, layout-audit, make all64 iso-uefi, build flag-on, smoke tls-handshake, release-check) confirmada pelo operador; tag criada manualmente."
