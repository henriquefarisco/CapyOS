        summary: "Slice 3E.4 entregue: storage stack smoke marker forense. Novo `include/drivers/storage/storage_smoke.h` + `src/drivers/storage/storage_smoke.c` com gate deterministico host-testable: `storage_smoke_state` (ahci_ok_count + nvme_ok_count + emitted latch), `storage_smoke_state_reset`, `storage_smoke_gate_observed(ahci, nvme)` puro (OK se qualquer contador >=1), `storage_smoke_observe(state, source)` que incrementa o counter da fonte (AHCI ou NVMe), retorna 1 exatamente uma vez na transicao blocked->observed e latcha `emitted=1`. Novo `src/drivers/storage/storage_smoke_io.c` (kernel-only): emite `STORAGE_SMOKE_MARKER` em COM1 (`com1_puts`) + `klog(KLOG_INFO, ...)`. Stub no-op `tests/stubs/stub_storage_smoke_io.c` para host runner. AHCI integration: `ahci.c` ganha `g_ahci_smoke_state` em escopo de arquivo + helper `ahci_smoke_signal_ok()`; `ahci_read_block_ex`/`ahci_write_block_ex` chamam o helper quando `cls == BLOCK_IO_OK`. NVMe integration simetrica: `g_nvme_smoke_state` + `nvme_smoke_signal_ok()` em `nvme_block_read_ex`/`nvme_block_write_ex`. 9 host tests em `tests/drivers/test_storage_smoke_gate.c`: state_reset zera + null-safe; gate predicate 0,0 / 1,0 / 0,1 / many; first AHCI emite + counters; first NVMe emite + counters; subsequent (mesma ou outra fonte) NAO re-emite mas counters continuam incrementando; invalid source rejeitado sem mutar counters; null state retorna 0; canonical marker string `[smoke] storage-stack ready` immutable. Makefile wira storage_smoke.o + storage_smoke_io.o em runtime objs; test source + stub em TEST_SRCS; test_runner.c declara e chama `run_storage_smoke_gate_tests`. Migracao completa de dbg_puts -> klog deixada como sub-slice 3E.4.B (mecanico, ~50 sites em ahci.c + nvme.c) para nao bloquear Slice 3E.5 (gate externo). Zero coordenacao cross-repo: marker e novo mas e read-only para sister repos; nenhum contrato tocado. Proximo bloco: Slice 3E.5 (smoke gate externo `smoke-x64-vmware-storage-resilience` consumindo o marker)."
      - version: 0.8.0-alpha.249+20260521
        date: 2026-05-21
        summary: "Slice 3E.3 entregue (escopo reduzido): infraestrutura de multi-slot AHCI. Novo `include/drivers/storage/ahci_slot_allocator.h` + `src/drivers/storage/ahci_slot_allocator.c` (bitmap allocator puro 32 slots, host-testable): `init(slot_count)`, `alloc()` lowest-first, `release(slot)` rejeita double-release, `inflight_count()`, `is_free(slot)`, `reset()`. `src/drivers/storage/ahci.c::struct ahci_port_ctx` ganha `slot_alloc`; `ahci_setup_port` prima com `AHCI_RUNTIME_SLOT_COUNT=1` (cap atual ate Slice 3F provisionar N command tables). `ahci_exec_classified` aloca slot, usa o indice no header (`cmd_list[slot]`) e na mascara CI (`mmio_write32(&port->ci, 1u << slot)`), libera no completion limpo e no aborted path; no TIMEOUT path NAO libera (deixa inflight ate `ahci_port_comreset` chamar `ahci_slot_allocator_reset`). NVMe: `NVME_QUEUE_DEPTH` ja era 64 desde antes, `next_cid` ja era uint16 com wrap-safe rolling — auditado e documentado neste plano. 11 novos host tests em `tests/drivers/test_ahci_slot_allocator.c`: init typical (4 slots, mask=0x0F, inflight=0), init full-32 (mask=0xFFFFFFFF), init invalid (slot_count=0 ou >32 desabilita allocator); alloc lowest-first (0,1,2), alloc until full then -1; release reuses lowest; release rejeita slot negativo / out-of-range / nao alocado / NULL alloc; double-release rejeitado; is_free accessor; reset marca todos livres; inflight count = 32 quando full-32. Makefile wira `ahci_slot_allocator.o` em runtime objs + tests em TEST_SRCS; test_runner.c declara e chama `run_ahci_slot_allocator_tests`. Concurrent inflight real e diferido para Slice 3F (depende de scheduler async da Etapa 4 + provisionamento de multi-table); o allocator esta pronto para drop-in quando esses chegarem. Zero coordenacao cross-repo. Proximo bloco: Slice 3E.4 (klog estruturado + smoke marker `[smoke] storage-stack ready`)."
