 por build/capypkg/*.manifest (ou target/capypkg/* para CapyLang), valida campo a campo (alfabeto name, HTTPS payload_url, hex sha256, install_root scope, depends, payload_size <= 8MiB, printable ASCII em values) e agrega em build/capypkg/modules-index.txt; novo target make modules-index. Em cada um dos 6 repos externos (CapyAgent, CapyBrowser, CapyCodecs, CapyUI, CapyLang, CapyBenchmark) adiciona target make package que produz <canonical-name>-<version>.bin (tar ustar determinístico de src+docs+VERSION) + <canonical-name>.manifest (line-oriented), com PUBLISH_URL_BASE override e dependencias declaradas (CapyBrowser depende de org.capyos.codecs.image-basic). Documentacao: docs/operations/manual-module-deploy-runbook.md atualizado com secoes 1.1 (make package por repo), 1.2 (make modules-index e publish), 4.A (auto-bootstrap por profile) e 5.4 (equivalente profile para o caminho lab unsigned); CapyAgent/docs/capypkg-publisher-guide.md atualizado com workflow real do make package + PUBLISH_URL_BASE. NAO fecha a Etapa 9 (continua bloqueada por Etapas 3-8). NAO adiciona tela interativa de profile no first-boot wizard (escopo Etapa 8 explicitamente nao tocado). NAO altera capypkg core, audit trail ou contratos externos existentes — todos os simbolos novos sao aditivos. NAO altera a Etapa 3 oficialmente em andamento."
