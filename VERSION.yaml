        summary: "Hardening + cleanup batch sobre alpha.259, sem impacto ao caminho de boot VMware oficial. Cinco frentes entregues em sequencia. FRENTE 1 (Sub-slice 3E.4.C concluida): migracao mecanica `dbg_puts`/`dbg_hex32`/`dbg_putc` -> `klog`/`klog_hex` em 11 TUs adicionais (~158 sites) + remocao dos helpers locais e de variantes `_serial` em 2 headers internos (`src/fs/capyfs/runtime/internal/capyfs_runtime_internal.h` perdeu `dbg_putc_serial`/`dbg_hex32_serial`/`dbg_be32_serial_load`; `src/arch/x86_64/kernel_volume_runtime/internal/kernel_volume_runtime_internal.h` perdeu `dbg_putc`/`dbg_puts`/`dbg_hex32`). Arquivos migrados (batch LF): `format_mount.c` (6 sites com inline da loader big-endian usada pelo chained dbg_putc+dbg_hex32), `filesystem_helpers.c` (3 sites collapsed em uma chamada `klog_hex`), `public_mount_api.c` (6 sites com nivel INFO/WARN derivado do contexto), `mount_initialize.c` (16 sites cobrindo init begin/ok, crypt roundtrip fail/ok, capyfs_format fail/ok, crypt blk0 word0/word1, mount after format fail/ok), `crypt_aes_xts.c` (35 sites — maior arquivo do batch — cobrindo block-0 read/write audit + lower read/write fail diagnostics; helper local renomeado de `dbg_be32` para `crypt_be32`). Arquivos migrados (batch CRLF apos normalizacao via `perl -i -pe 's/\\r$//g'`): `ramdisk.c` (9 sites; helper renomeado para `ramdisk_be32`), `buffer_cache.c` (13 sites; evict-none + read-fail-context decompostos em entradas separadas), `offset_wrapper.c` (15 sites; rel+abs LBA emitidos como dois `klog_hex` por failure), `chunk_wrapper.c` (19 sites; chunked+sub+abs LBA emitidos como tres `klog_hex` por failure), `efi_block.c` (21 sites; io-fail e verify-fail emitidos como op+blk+media+code via `klog` + tres `klog_hex`), `storage_runtime.c` (15 sites; decisoes de backend native vs EFI vs fallback como `klog(KLOG_INFO/WARN, ...)` + promotion-success como dois `klog_hex`). Helpers puros preservados onde ainda utilizados (`dbg_be32_local` em `kernel_volume_runtime_internal.h`, `crypt_be32` em `crypt_aes_xts.c`, `ramdisk_be32` em `ramdisk.c`) — sao loaders big-endian sem I/O, usados pelos novos `klog_hex` para extrair audit signatures. Production traces agora vao para klog ring (recoverable via `klog_dump` e persistido pelo logger service em `/var/log/capyos_klog.txt`) ao inves de port 0xE9 (QEMU-only `-debugcon`). Side-effect: 6 arquivos migraram de CRLF para LF, alinhando com a convencao majoritaria do tree. Mantidos por design: `kernel_main.c` (5 sites `dbg_hex64`/`dbg_hex8` no boot pulse antes de `klog_init`); `capyfs_dbg_puts`/`capyfs_dbg_hex32` em `format_mount.c`/`directory_entries.c`/`namespace_ops.c` (gated por `CAPYFS_DEBUG_CREATE=0`, compilam para no-op em producao). FRENTE 2 (Sub-slice 3E.5.B entregue): `nvme_controller_reset` extracted em logica pura host-testavel. Novo `include/drivers/nvme/nvme_reset.h` declara `struct nvme_reset_queue_state` (uint16_t admin_sq_tail/admin_cq_head + uint8_t admin_cq_phase + uint16_t io_sq_tail/io_cq_head + uint8_t io_cq_phase, alinhado byte-for-byte com `struct nvme_device`), `nvme_reset_reprime_queue_state` (NULL-safe, zera heads/tails e seta phases=1 — o baseline pos-CC.EN-toggle), predicados `nvme_reset_csts_rdy_cleared`/`nvme_reset_csts_rdy_set` (testam bit 0 = NVME_CSTS_RDY duplicado como `NVME_RESET_CSTS_RDY_MASK = 0x1u` para que a TU pura nao puxe `drivers/nvme.h` + PCIe), `enum nvme_reset_admin_action` (DONE=0, CREATE_IO_CQ=1, CREATE_IO_SQ=2 — valores estaveis pinned por teste), `struct nvme_reset_progress` (uint8_t io_cq_recreated + io_sq_recreated), e planner `nvme_reset_next_admin_action(progress*)` que retorna a proxima admin action com semantica: empty -> CREATE_IO_CQ; cq_done -> CREATE_IO_SQ; ambos -> DONE; SQ-antes-de-CQ (inalcancavel mas defensivo) -> CREATE_IO_CQ. Novo `src/drivers/nvme/nvme_reset.c` implementa as 5 funcoes em ~50 linhas (zero I/O, zero kalloc, zero klog). `nvme_controller_reset` em `src/drivers/nvme/nvme.c` refatorado: ao inves de chamar `nvme_create_io_cq(dev, 1)` seguido de `nvme_create_io_sq(dev, 1, 1)` em sequencia rigida (BUG #2 fix do alpha.252), agora chama `nvme_reset_reprime_queue_state(&qs)` + aplica em campos dev->* + entra em `for (;;) { action = nvme_reset_next_admin_action(&progress); ... }` despachando cada acao retornada. Comportamento observavel preservado bit-for-bit, mas a ordem CQ->SQ agora vive em arquivo testavel em host. Novo `tests/drivers/test_nvme_controller_reset.c` com 13 casos cobre: reprime zera heads/tails + seta phases + NULL-safe (3 testes); CSTS RDY cleared/set + complementaridade XOR=1 em todas as entradas (3 testes); planner NULL->DONE, vazio->CREATE_IO_CQ, CQ->CREATE_IO_SQ, ambos->DONE, SQ-antes-de-CQ->CREATE_IO_CQ, full-sequence-drives-2-then-DONE, valores estaveis do enum (7 testes). Makefile wired (`nvme_reset.o` apos `nvme_commands.o`); test runner adiciona `run_nvme_controller_reset_tests`. FRENTE 3 (Etapa 4 Fase E entregue): smoke gate `[smoke] thread-crash-survives ready` formaliza a propriedade 'kernel sobrevive a crash de thread de app' do critical-criteria checklist da Etapa 4. Novo `include/kernel/thread_crash_smoke.h` declara `struct thread_crash_smoke_state` (last_exit_code int32_t + crashes_observed/ticks_after_crash uint32_t + emitted uint32_t), constantes `THREAD_CRASH_SMOKE_FAULT_EXIT_THRESHOLD=128` (POSIX death-by-signal encoding usado por `process_exit(128 + (int)vector)` no x64 fault dispatcher) e `THREAD_CRASH_SMOKE_REQUIRED_TICKS_AFTER_CRASH=4` (proof-of-life threshold), `thread_crash_smoke_gate_observed(crashes, ticks)` predicate puro (>=1 crash AND >=N ticks), `thread_crash_smoke_observe_exit(state, code)` (rejeita codes < 128, conta crashes), `thread_crash_smoke_observe_tick(state)` (ignora ticks antes do primeiro crash, conta apos), state singleton `thread_crash_smoke_try_latch_exit_global`/`thread_crash_smoke_try_latch_tick_global`/`thread_crash_smoke_global_reset`, marker emit `thread_crash_smoke_emit_marker` (COM1 + klog). Implementacao em `src/kernel/thread_crash_smoke.c` (latch puro) + `src/kernel/thread_crash_smoke_io.c` (emit COM1+klog stub-overridable por host tests). Hook em `src/kernel/process.c::process_exit` (gated por `#ifdef CAPYOS_THREAD_CRASH_SURVIVES_SMOKE`): apos FD cleanup, se code >= 128 alimenta `thread_crash_smoke_try_latch_exit_global` e emite marker se gate flipped. Hook em `src/kernel/scheduler.c::scheduler_tick`: chama `thread_crash_smoke_try_latch_tick_global` no top do tick handler (gated pelo mesmo flag). Helper kernel-task `thread_crash_smoke_helper_entry` registrado por `thread_crash_smoke_maybe_start_helper` em `scheduler_set_running(1)`: dispatch unico que feeds o latch com `128 + 14` (page-fault vector encoding) e depois `task_yield()` para sempre. 10 testes host em `tests/kernel/test_thread_crash_smoke_gate.c` cobrem reset zero-init + NULL-safe, gate predicate, clean exits ignored, crash observation, ticks before crash ignored, crash-then-N-ticks-emits-once, marker constant canonical, global latch single emission, global reset isolation. Novo Makefile target `smoke-x64-vmware-thread-crash-survives`: clean + all64 PROFILE=full EXTRA_CFLAGS64='-DCAPYOS_THREAD_CRASH_SURVIVES_SMOKE' + iso-uefi + manifest64 + smoke_x64_vmware.py com markers DHCP -> gui-session -> thread-crash-survives. Documentacao §5.5 do `docs/operations/etapa-4-external-validation-playbook.md` atualizada com 'Status parcial implementado'. FRENTE 4 (Etapa 4 Fase D follow-up): cursor erase escopado para overlap fecha o criterio 'cursor e texto nao piscam sob resize/move de janela' para o caso cursor parado. Antes: `compositor_render` em modo partial-damage chamava `copy_backbuffer_rect_to_front(cursor_x, cursor_y, W, H)` incondicionalmente apos renderizar todos os dirty rects, mesmo quando nenhum dirty rect tocava a area do cursor — em hosts com framebuffer lento (Hyper-V Gen2 reportado pelo operador) isso aparecia como flicker brevissimo do cursor entre dois frames sem mudanca de cena. Agora: novo `render_cursor_overlaps_damage()` checa intersecao com todos os `comp_dirty_rects`; o erase so executa quando o sprite realmente intersecta um dirty rect, e o contador novo `comp_stats.cursor_erases_partial` (publico em `struct compositor_stats`, sempre 0 em modo full-present) evidencia quantas vezes o caminho foi exercitado. `compositor_render_cursor` ganhou: erase do retangulo antigo quando cursor MOVE mesmo apos `comp_full_presented=1`, preservando o invariante 'sem rastro de cursor' (o caso onde a primeira otimizacao acima poderia ter deixado pixels do cursor antigo na tela ao mover entre frames sem overlap). Teste novo `test_compositor_cursor_erase_only_on_overlap` em `tests/gui/test_compositor_events.c` trava ambos os casos: cursor disjoint -> contador nao incrementa; cursor com overlap -> contador incrementa. Documentacao §5.4 do playbook atualizada com 'Follow-up 2026-05-25 (cursor erase scoped to overlap)'. FRENTE 5 (Hardening da revisao regressiva): P1-A storage Hyper-V retry — novo `SYSTEM_WORK_STORAGE_HYPERV_RETRY` em `include/core/work_queue.h` + `src/core/work_queue.c::work_seed` + handler `kernel_work_storage_hyperv_retry` em `src/arch/x86_64/kernel_services_work.c` com self-disable em non-Hyper-V (`hyperv_detect() == 0`) e backoff de 600 ticks (~6s) apos initial delay de 1200 ticks; tenta `x64_storage_runtime_try_enable_hyperv_native` em loop ate sucesso ou stop signal. P1-C `vmbus_transport_drain_simp` em `src/drivers/hyperv/vmbus_transport.c` reescrito com cap de 256 iteracoes e continue apenas em retorno POSITIVO de `vmbus_consume_simp_slot` (matches a semantica 'bytes consumed'; 0=nada, negativo=erro com slot ja tratado); antes o `while (consume() != 0)` poderia pinar a thread se `g_simp_page` fosse desanexada mid-drain (consume retornaria -1 a cada chamada e o loop nunca terminava). P1-E `mouse_ps2_init` em `src/drivers/input/mouse.c`: removidos os dois assignments `mouse_current.screen_width=800` + `screen_height=600` que sobrescreviam qualquer `mouse_set_bounds(W, H)` chamado antes da probe PS/2 (o framebuffer publica suas dimensoes via `desktop_init` antes da probe completar). O default 800x600 ja e aplicado lazily por `mouse_ensure_bounds()` no primeiro `mouse_apply_event`, entao o boot continua seguro mas os bounds reais do framebuffer agora sobrevivem ao init do PS/2. P1-F `usb_poll_all` em `src/drivers/usb/usb_core.c`: adicionado guard defense-in-depth `i < USB_MAX_DEVICES` ao loop sobre `g_device_count`; redundante na execucao normal (caller ja cappa em `usb_enumerate_devices`) mas blinda contra stray write em `g_device_count`. P1-B (`login_runtime` polls 12x) investigado e classificado como design intencional (cada chamada e ponto de drain em transicao significativa do shell loop interativo); mantido como-is. P1-D (`vmbus_mouse` experimental loop) permanece gated atras de `CAPYOS_EXPERIMENTAL_HYPERV_MOUSE` (default OFF, sem codigo ativo em producao). Zero coordenacao cross-repo: tudo dentro do CapyOS core; ABIs publicas novas (`drivers/nvme/nvme_reset.h`, `kernel/thread_crash_smoke.h`) sao aditivas; `struct compositor_stats` ganhou campo aditivo `cursor_erases_partial`. Sister repos (CapyUI 2.13.1, CapyAgent 0.0.4, CapyBrowser 0.0.4, CapyCodecs 0.0.4, CapyLang 0.1.3, CapyBenchmark 0.0.4) sem mudanca. `docs/plans/STATUS.md` atualizado com tres novas secoes (3E.4.C concluida, 3E.5.B concluida, Hardening da revisao regressiva). Etapa 4 todos os 6 criterios de aceite marcados como atendidos em codigo + host tests; pendente apenas execucao externa em VMware oficial (Fase F)."
      - version: 0.8.0-alpha.259+20260525
        date: 2026-05-25
        summary: "Slices 1+2 da stack de compatibilidade Hyper-V entregues sem impactar VMware. SLICE 1 (ATA-PIO promovido a backend nativo): novo enum value `X64_STORAGE_BACKEND_ATA_PIO` em `include/arch/x86_64/storage_runtime.h` (append-only sobre NONE/EFI_BLOCK_IO/AHCI/NVME), novo header publico `include/drivers/storage/ata_pio.h` declarando `ata_init`/`ata_devices_count`/`ata_device_by_index`/`ata_primary_device`, `src/arch/x86_64/storage_runtime.c::x64_storage_runtime_backend_name` + `x64_storage_runtime_native_candidate_name` retornam `\"ata-pio\"`, `src/arch/x86_64/storage_runtime_native.c::x64_storage_runtime_native_probe` ganha terceiro probe (apos NVMe e AHCI) que chama `ata_init` + `ata_primary_device` e roteia pelo `probe_native_storage_backend_from_raw` ja existente. Probe order NVMe -> AHCI -> ATA-PIO preservado: branch ATA-PIO so executa quando NVMe E AHCI nao promovem block_device, garantindo zero impacto na trilha oficial VMware + UEFI + E1000 (que sempre promove NVMe/AHCI). `src/drivers/storage/ata_pio.c` ja existia (driver LBA28 com dois canais primary/secondary + master/slave, IDENTIFY com retry + soft reset, ghost-check + signature probe ATAPI, status decoding BSY/RDY/DRQ/DF/ERR); zero modificacao no driver — apenas wiring novo no Makefile (`$(BUILD)/x86_64/drivers/storage/ata_pio.o` na lista de objetos kernel x86_64) e include do novo header em `storage_runtime_native.c`. Targets concretos: Hyper-V Generation 1 com VHD anexado por IDE, QEMU/Bochs/VirtualBox legacy IDE, bare-metal com firmware ATA fallback. SLICE 2 (wizard-em-RAM com warning persistente): `src/arch/x86_64/kernel_main.c::stage_8` substitui o override fail-closed `if (!g_shell_persistent_storage) { validated_storage_ready = 0; }` (introduzido em sessao anterior) por uma politica fail-degraded de tres branches: (a) `shell_runtime_rc != 0` mantem maintenance (storage runtime realmente falhou); (b) `!x64_storage_runtime_has_device()` mantem `validated_storage_ready = 1` e adiciona warning `\"Persistent storage unavailable; configuration will NOT survive reboot\"` em `g_boot_warnings`, permitindo que o usuario alcance o wizard ao inves de ficar preso em maintenance; (c) `!g_shell_persistent_storage` (probe achou device mas mount/unlock falhou e o recovery RAM fallback assumiu) tambem mantem `validated_storage_ready = 1` com warning `\"Persistent volume not mounted; running in RAM (no persistence)\"`. UX deixa de ser regressiva no Hyper-V Gen2 (onde StorVSC ainda nao tem data plane) — usuario completa wizard em RAM com aviso loud ao inves de aprisionado em maintenance. VMware path nao executa nenhum desses branches porque NVMe/AHCI sempre promovem device real. SLICE 3 PLAN (StorVSC I/O wire-up): novo documento arquitetural `docs/architecture/hyperv-compatibility-stack-plan.md` (216 linhas) cataloga as 7 slices da stack Hyper-V completa, com Slice 1+2 marcadas delivered e Slice 3 (SCSI CDB + VMBus packets + GPA descriptors + block_device facade sobre o STORVSC_BACKEND_READY ja entregue) detalhada com camadas TU-by-TU, data-plane invariants (DMA buffers de `pmm_alloc_pages`/`kmalloc_aligned(4096)`, GPA descriptor com physical addr, single-LUN inicial, sync wrapper polling bounded), enum value `X64_STORAGE_BACKEND_STORVSC` reservado append-only, plano de validacao (focused unit tests SCSI CDB encoding + GPA construction + completion correlation + retry-on-timeout; gate externo novo `smoke-x64-hyperv-gen2-storage`) e out-of-scope explicito (async multi-queue, hot-plug, SCSI pass-through, UNMAP/VSS). Slices 4-6 placeholders (NetVSC, VMBus keyboard promotion, device manager hot-plug). SELF-TESTS HOST-ONLY: novo `tools/scripts/test_hyperv_compat_storage_stack.py` (156 LOC) cobrindo Makefile wiring (ata_pio.o presente + AHCI/EFI block intactos), header presence + 3 simbolos publicos, enum append-only com ordem `NONE -> EFI_BLOCK_IO -> AHCI -> NVME -> ATA_PIO`, runtime impl reporta `\"ata-pio\"` 2x, native probe inclui header + chama `ata_devices_count` + `ata_primary_device` + promove via `X64_STORAGE_BACKEND_ATA_PIO`, probe order strict NVMe < AHCI < ATA-PIO; `tools/scripts/test_hyperv_persistent_boot_policy.py` reescrito (113 LOC) com tres invariantes Slice 2: RAM-fallback branch mantem `validated_storage_ready=1` + warning `NOT survive reboot`, mount-fail RAM branch mantem `validated_storage_ready=1` + warning `running in RAM`, override fail-closed legado (`validated_storage_ready=0 quando !g_shell_persistent_storage`) proibido (regressao guard). Makefile wira o novo self-test em `hyperv-baseline-evidence-selftest`. VALIDACAO LOCAL EXECUTADA: `make test` (>900 testes OK), `make layout-audit` (sem warnings), `make hyperv-baseline-evidence-selftest` (7 self-tests Hyper-V OK incluindo o novo), syntax-check `clang --target=x86_64-unknown-elf -fsyntax-only` sobre 4 TUs de storage + kernel_main.c (limpo). VALIDACAO EXTERNA PENDENTE: `make all64` + `make iso-uefi` + smoke real em VM Hyper-V Gen1 (esperado backend=ata-pio no `runtime-native show` e wizard completando em storage persistente) e VM Hyper-V Gen2 (esperado warning loud `NOT survive reboot` na boot e wizard alcancavel em RAM). Zero coordenacao cross-repo: sister repos CapyUI/CapyAgent/CapyBrowser/CapyCodecs/CapyLang/CapyBenchmark intocados; contratos `services/capypkg`, `kernel/module_gate.c`, install profile schema, capy-ui-widget v2.13/schema v7 todos preservados. Plataforma oficial VMware + UEFI + E1000 mantida; track Hyper-V continua laboratory compatibility (nao promove plataforma oficial). Etapa 4 segue ativa sem alteracao de estado."
