        summary: "Ed25519 real (RFC 8032) em src/security/ed25519.c. ANTES: esqueleto fail-closed desde alpha.210 — ed25519_verify retornava -1 incondicionalmente; ed25519_sign zerava signature; ed25519_create_keypair zerava ambas chaves. Update verifier em producao rejeitava 100% dos manifests por design (apenas tests UNIT_TEST com hook g_update_manifest_verifier conseguiam aceitar fixtures). Field arithmetic GF(2^255-19) duplicado: x25519.c tinha implementacao real, ed25519.c tinha esqueleto dormante com naming diferente (fe25519 vs fe), impedindo refatoracao. AGORA: refatoracao 1 — fe25519 compartilhada. include/security/fe25519.h expoe APIs canonicas (fe_zero, fe_one, fe_copy, fe_add, fe_sub, fe_neg, fe_carry, fe_mul, fe_sq, fe_mul_small, fe_invert, fe_pow22523, fe_cswap, fe_cmov, fe_tobytes, fe_frombytes, fe_isnegative, fe_iszero, fe_notequal, fe_wipe); src/security/fe25519.c extrai a implementacao de x25519.c (~400 LOC), adiciona fe_pow22523 (cadeia ref10 para sqrt em Ed25519 decode), fe_neg, fe_cmov, fe_isnegative, fe_iszero, fe_notequal. x25519.c reduzida para Montgomery ladder + APIs publicas (~180 LOC, consome fe25519). Refatoracao 2 — Ed25519 real. src/security/ed25519.c (~1500 LOC) implementa: twisted Edwards group ops extended coordinates (X:Y:Z:T) com a=-1, ge_dbl (dbl-2008-hwcd: A=X^2, B=Y^2, C=2Z^2, D=-A, E=(X+Y)^2-A-B, G=D+B, F=G-C, H=D-B, X3=EF, Y3=GH, T3=EH, Z3=FG), ge_add (add-2008-hwcd-3 com 2d*T1*T2), ge_neg_p (-X, Y, Z, -T), ge_cmov constant-time, ge_scalarmult double-and-add constant-time iterando bits 255 down to 0 com D=2R0+S=D+P+cmov, ge_scalarmult_base usando ED_B fixo, ge_double_scalarmult para verify (k*A + S*B). Encoding/decoding compressed: ge_encode (Y/Z em 32 bytes LE + sign(x) bit em top byte), ge_decode (parse y + check canonical, candidate x = u*v^3*(uv^7)^((p-5)/8), verify v*x^2==±u, multiply by sqrt(-1) if -u, set sign, reject x==0 & x_0==1). Scalar arithmetic mod L: sc_reduce64 (porte ref10/sc25519.c, signed 21-bit limbs cascading fold), sc_muladd (a*b+c mod L), sc_is_canonical (S < L constant-time). Constants verificadas contra dalek-cryptography 5x51 limbs: ED_D, ED_D2 (=2d), ED_SQRTM1, ED_B_X, ED_B_Y, ED_B_T, ED_L_BYTES. SHA-512 helpers sha512_two_block e sha512_three_block com wipe de struct sha512_ctx. APIs publicas: ed25519_create_keypair (seed -> SHA-512 -> clamp s + prefix + scalar mult base + encode), ed25519_sign (h=SHA-512(seed), s=clamp(h[0..32]), prefix=h[32..64], r=sha512(prefix||M) mod L, R=rB, k=sha512(R||A||M) mod L, S=r+ks mod L), ed25519_verify (S canonical check, R/A decode, k=sha512(R||A||M) mod L, check 8(SB-kA) == 8R via projective equality X1Z2==X2Z1 && Y1Z2==Y2Z1). update_agent.c production gate agora chama ed25519_verify real — manifests assinados com chave canonica sao aceitos quando criptograficamente validos. Wipe hygiene volatile-safe em todos os fe/ge/scalar/SHA-512 intermediarios. Tests: test_ed25519_failclosed_contract reformulada com vetores RFC 8032 §7.1 (3 casos + tampering + wrong-pk + non-canonical-S + NULL + round-trip + determinism + tamper-message)."
      - version: 0.8.0-alpha.216+20260513
        date: 2026-05-13
        summary: "X25519 (RFC 7748) ECDH canonico em src/security/x25519.c. ANTES: o sistema tinha SHA-256/HMAC/PBKDF2/HKDF/AES-XTS/CSPRNG/ChaCha20-Poly1305 mas faltava a primitiva fundamental de key exchange. Para qualquer protocolo que precisasse de derivacao de chave compartilhada entre duas partes sem segredo pre-compartilhado (TLS 1.3 userland Etapa 5, WireGuard-like, channel binding, secure messaging local com forward secrecy), nao havia primitiva canonica fora do BearSSL — e BearSSL so expoe X25519 internamente dentro do engine SSL. Ed25519 esqueleto continua fail-closed desde alpha.210 — entao tambem nao havia assinatura ECC real. Triplet ECDH+HKDF+AEAD incompleto (faltava o E do ECDH). AGORA: implementacao do zero em src/security/x25519.c (~470 LOC) audit-friendly. Field arithmetic GF(2^255-19) em radix 5x51-bit com __uint128_t multiplication (fe_mul, fe_sq, fe_mul_small para multiplicacao por a24=121665, fe_add, fe_sub com soma de 2p para evitar underflow, fe_carry com propagacao mod p, fe_invert via cadeia ref10 com 255 squarings + 11 multiplications, fe_tobytes com canonicalizacao para [0,p) via subtracao condicional constant-time, fe_frombytes com top-bit masking, fe_cswap constant-time via mask -(uint64_t)swap). Montgomery ladder de 255 iteracoes (bit 254 down to bit 0) per RFC 7748 §5 pseudocode, em tempo constante (sem branches sobre bits secretos). Duas APIs publicas em include/security/x25519.h: x25519(scalar, u_coord, shared) com clamping interno e small-subgroup detection (rejeita shared=0 fail-closed); x25519_base(scalar, public_key) usando u=9 (RFC 7748 §4.1). Wipe hygiene volatile-safe em todos os intermediarios (x_2/z_2/x_3/z_3, A/AA/B/BB/E/C/D/DA/CB/tmp1/tmp2 da ladder, t0..t3 do invert, e clamped scalar) em todos os exits. Threat model documentado inline: confidencialidade do shared sob CDH assumption, fail-closed em small-order points (atacante nao forca shared=0 via point malicioso), top-bit masking previne fingerprinting. Limites documentados: implementacao NAO autentica public keys (caller responsibility). Composicao com slices anteriores: alpha.214 (CSPRNG fornece scalar uniforme), alpha.213 (HKDF deriva session key de shared+context), alpha.215 (ChaCha20-Poly1305 protege canal com session key derivada). Triplet canonico agora completo. Tests: test_x25519_rfc7748_scalarmult (2 vetores §5.2), test_x25519_rfc7748_dh (Alice/Bob §6.1 com publication + convergence), test_x25519_small_order_rejection (u=0 e u=1 ambos rejeitados), test_x25519_fail_closed (5 NULL combinations), test_x25519_high_bit_masked (flip de bit 255 do u nao muda output), test_x25519_scalar_clamping (flip de bits clamped no scalar nao muda output). Build: x25519.o em CAPYOS64_OBJS + x25519.c em TEST_SRCS. ABI publica nova, aditiva. Sem callers reais ainda — primitiva fundacional para Etapa 5 e slices subsequentes."
      - version: 0.8.0-alpha.215+20260513
        date: 2026-05-13
        summary: "ChaCha20-Poly1305 AEAD (RFC 8439) canonico em src/security/. ANTES: o unico ChaCha20/Poly1305 do sistema vivia dentro do BearSSL (third_party) e era acessivel apenas via cipher suites do TLS handshake. Para qualquer uso fora de TLS (secure messaging local, key wrapping, container cifrado em userland, channel binding, mensagens de IPC autenticadas), nao havia primitiva canonica disponivel — exigia ou reinventar em cada caller (overhead + bugs) ou abusar a interface SSL do BearSSL (acoplamento indesejado). AES-XTS existente fornecia confidencialidade (volume cifrado) mas sem autenticacao — atacante com acesso fisico ao disco pode flipar bits sem detectar. AGORA: implementacao do zero em src/security/chacha20_poly1305.c (~600 LOC) audit-friendly, independente, alinhada com a higiene cripto do projeto (wipe volatile-safe, fail-closed, NULL graceful). Tres niveis de API publica em include/security/chacha20_poly1305.h: (1) chacha20_block (RFC §2.3) gera 64 bytes de keystream por (key, counter, nonce); (2) chacha20_encrypt (RFC §2.4) stream cipher com counter overflow fail-closed (256 GiB max por key/nonce); (3) poly1305_mac (RFC §2.5) one-shot MAC com clamping correto, radix-26 multiplication, reducao mod 2^130-5 constant-time; (4) chacha20_poly1305_encrypt/decrypt (RFC §2.8) AEAD com OTK derivada do bloco 0, tag verification em tempo constante via crypt_constant_time_compare ANTES do decrypt (nao revela plaintext parcial se tag invalido). Composicao com alpha.213 (HKDF) e alpha.214 (CSPRNG) integral. Tests: 4 novos test functions com 30+ assertions cobrindo vetores oficiais §A.1 e §A.3, round-trip, in-place, tampering (ct/AAD/tag flips), wrong key/nonce, empty pt/AAD, fail-closed em NULL e counter overflow. Composicao com BearSSL preservada — esta primitiva e PARA usos fora de TLS; BearSSL continua sendo o stack TLS handshake oficial. ABI publica nova."
      - version: 0.8.0-alpha.214+20260513
        date: 2026-05-13
        summary: "CSPRNG hardening profundo. ANTES: (1) rdtsc usava constraint \"=A\" mal-formed em x86_64 (\"A\" significa \"union de RAX e RDX\" em 64-bit, ambiguo); (2) boot-time entropy era apenas salt fixo + RDRAND (se disponivel) + TSC isolado — em VM hostil sem RDRAND e com TSC virtualizado, pool inicial era essencialmente deterministico; (3) sem reseed proativo: sessoes longas operavam em pool estagnado, sem nova entropia hardware sendo injetada periodicamente; (4) csprng_feed_entropy aceitava apenas uint32_t, fragmentando entradas naturalmente de 64+ bits (TSC, packets); (5) callers de feed_entropy se limitavam a PIT e keyboard, ignorando mouse e fontes potencialmente ricas. AGORA: rdtsc usa constraints separadas \"=a\"/\"=d\" corretas em ambos os modos; boot adiciona TSC jitter loop (16 deltas de operacoes triviais para coletar variacao residual de cache/predictor — entropia mesmo em VM determinista); boot mistura endereco do pool (KASLR-aware versionamento); reseed automatico a cada 64 KiB emitidos chama RDRAND/TSC frescos (Linux usa 4 MiB, FreeBSD 1 MiB, OpenBSD por tempo — 64 KiB e conservador); RDRAND ganha retry-loop de 10 attempts per Intel guidance; mix_hardware_entropy centraliza fontes hardware reutilizado em init, reseed automatico e csprng_reseed manual; nova API csprng_feed_entropy_buffer aceita buffer arbitrario para fontes ricas (network packets, disk reads); nova API publica csprng_reseed expoe reseed manual para callers criticos antes de TLS handshake/key generation/etc; mouse PS/2 ISR agora alimenta CSPRNG com cada byte de pacote (timing humano residual). Wipe hygiene preservada (sha256_clear em snapshot por iteracao desde alpha.208). 3 novos testes contratuais em test_csprng.c. ABI publica preservada — APIs novas nao quebram callers existentes."
      - version: 0.8.0-alpha.213+20260513
        date: 2026-05-13
        summary: "HKDF-SHA256 (RFC 5869) end-to-end: ANTES o sistema tinha apenas PBKDF2-SHA256 (para senhas) e HMAC-SHA256 (publico) — faltava um KDF context-aware adequado para derivacao de subkeys a partir de segredos uniformes. AGORA: crypt_hkdf_sha256_extract (PRK = HMAC(salt, IKM)), crypt_hkdf_sha256_expand (OKM = T(1)||T(2)||... onde T(i) = HMAC(PRK, T(i-1)||info||byte(i))), crypt_hkdf_sha256 (wrapper). HMAC-SHA256 streaming interno (hkdf_hmac_begin/update/end) evita alocacao para info_len arbitrario. Fail-closed: L <= 255*HashLen (8160 bytes), PRK >= HashLen, NULL out/prk rejeitados, L=0 e no-op success. Wipe hygiene: zero_salt, PRK, T(i), HMAC scratch (kipad/kopad/key_hash) e contextos SHA-256 zerados em todos os exits. Documentacao inline explicita threat model: HKDF NAO substitui PBKDF2 para senhas; assume IKM uniforme. Tests: 3 test cases do RFC 5869 Appendix A (TC1 small inputs, TC2 long inputs 80/80/80/82 spanning 3 expand iterations, TC3 salt/info empty exercising substituicao zero-octet) + 6 contract checks fail-closed. Habilita futuras camadas: TLS userland (Etapa 5), key wrapping para AES-XTS, secure boot, update_agent signing."
      - version: 0.8.0-alpha.212+20260513
        date: 2026-05-13
        summary: "Timing side-channel critico em userdb_authenticate_with_policy fechado: o wrapper retornava USERDB_AUTH_LOCKED imediatamente quando auth_policy_check_allowed era 0, pulando o PBKDF2 inteiro. Atacante remoto media latencia de resposta da API publica de login e distinguia accounts locked (microssegundos) de not-locked (~50ms PBKDF2), reabrindo via timing as informacoes que alpha.211 removeu de auth_policy_status (quais accounts estao em lockout) e alpha.206 removeu de userdb_authenticate (existencia). Pior: nao dependia de log/comando privilegiado — purely wall-clock observable. Mitigacao: sempre executar userdb_authenticate (que ja equaliza existent vs non-existent via k_userdb_dummy_salt desde alpha.206) ANTES de verificar lockout; se locked, descartar resultado e zerar out via user_record_clear. Custo: ~50ms por probe contra account locked (vantagem: rate-limita credential-stuffing e enumeracao de locked targets). Comentario SECURITY de ~40 linhas explica threat model. Teste contratual em test_auth_policy.c valida contrato policy-side."
      - version: 0.8.0-alpha.211+20260513
        date: 2026-05-13
        summary: "Privacy hardening do auth: auth_policy_status emitia lista detalhada de todos os usernames trackados (com failure_count e estado de lockout) via comando shell `auth-status` sem nenhum check de privilegio — qualquer sessao local (incluindo guest) podia enumerar usuarios, ver tentativas de login falhadas e identificar contas bloqueadas. Agora emite apenas counts agregados (Tracked: N (locked: M)). priv_log_emit em [priv] denied:/granted: anexava actor=<username> em toda denial de UI/shell (settings add-user, user-manage, set-pass:other) — todo klog dump (incluindo crash buffers e qualquer ferramenta que le o ring) ficava com o nome do principal. Agora emite actor_role=<role> que mantem o sinal de auditoria sem PII. Novas APIs publicas: auth_policy_tracked_count e auth_policy_locked_count (counts nao-identificantes). Test-only: auth_policy_is_tracked exposta apenas com UNIT_TEST para preservar regression tests sem abrir vetor de enumeracao em producao. Test contratual novo em test_privilege.c::test_privilege_log_omits_username valida que denied/granted nao vazam username e que actor_role aparece quando role esta populado, e que NULL actor + empty role degradam graciosamente."
      - version: 0.8.0-alpha.210+20260513
        date: 2026-05-13
        summary: "Hardening criptografico critico: ed25519_verify ANTES era matematicamente quebrado (aceitava qualquer assinatura forjada via equacao trivial: signature[32+i] = signature[i] + (hram[i] XOR ed25519_hash(public_key)[i]) — solucionavel sem private key, sem multiplicacao escalar na curva, sem qualquer relacao com RFC 8032). Esse verificador era o UNICO gate criptografico em manifest_signature_ed25519_valid de update_agent.c, usado em 7 paths para aceitar manifests de update — qualquer MitM no canal de updates podia instalar codigo arbitrario. AGORA: ed25519_verify retorna -1 incondicionalmente, ed25519_sign zera o buffer de saida, ed25519_create_keypair zera ambas as saidas, header documenta SECURITY WARNING explicito, comentario em manifest_signature_ed25519_valid esclarece o gate fail-closed em producao, esqueleto de aritmetica de curva preservado para implementacao futura. Testes contratuais novos em test_crypt_vectors.c::test_ed25519_failclosed_contract validam que verify rejeita todos os inputs, que sign nao escreve alem do buffer, que keypair zera ambas as saidas, e que NULLs sao tolerados. Path UNIT_TEST com g_update_manifest_verifier hook continua funcional (todos os testes existentes de update_agent passam)."
      - version: 0.8.0-alpha.209+20260513
        date: 2026-05-13
        summary: "Hardening cripto fim-a-fim: aplicacao sistematica de sha256_clear (API publica desde alpha.208) em todos os caminhos que processam segredos via contextos SHA-256 transitorios. `crypt.c::hmac_sha256` (usado por PBKDF2-SHA256 com 64000 iteracoes no path de login) zera `key_ctx` e `ctx` apos uso; `crypt.c::crypt_hmac_sha256` (API publica de HMAC) zera `ctx`; `sha256.c::sha256_hash` (convenience wrapper) zera `ctx`; `key_storage_probe.c::compute_volume_key_hash` (deriva o digest da senha do volume cifrado) zera `ctx`. Antes, em todos esses sites o contexto SHA-256 ficava vivo na stack apos `sha256_final`, carregando o hash produzido em `state[]` e o ultimo bloco padded (derivado do segredo) em `data[]` ate sobrescrita natural — agora a sanidade do wipe iniciada em alpha.208 e propagada para o caminho quente de cada login (PBKDF2 × 64000 invoca hmac_sha256, que invoca sha256_final tres vezes por iteracao) e para a derivacao de chave do volume."
      - version: 0.8.0-alpha.208+20260513
        date: 2026-05-13
        summary: "Hardening Etapa 2: CSPRNG passa a chamar sha256_clear no temp_ctx por iteracao em csprng_get_bytes (antes vazava state[] que carrega o digest entregue + data[] com o ultimo bloco padded). sha256_clear vira API publica em include/security/sha256.h com semantica volatile-safe. auth_policy ganha find_existing (read-only) usado por check_allowed/is_locked/record_success/unlock, fechando o ataque de exaustao da tabela g_attempts via probing de usernames forjados; find_or_alloc agora faz LRU eviction de entrada nao-bloqueada quando a tabela esta cheia (entradas locked sao protegidas, eviccao recusa NULL apenas quando todos os 32 slots estao locked). userdb_set_password ganha wipe sistematico de source/line/rec/out em todos os retornos (era parcial, deixava /etc/passwd inteiro com salt+hash hex no heap freed). memory_zero em user.c vira volatile-safe contra dead-store elimination. Testes contratuais novos cobrem sha256_clear semantics, no-alloc reads e LRU eviction."
      - version: 0.8.0-alpha.207+20260513
        date: 2026-05-13
        summary: "Hardening Etapa 2: userdb_authenticate ganha mitigacao de user enumeration timing (executa PBKDF2 com salt fictício mesmo quando o usuario nao existe). Novo userdb_authenticate_with_policy compoe auth_policy_check_allowed + userdb_authenticate + auth_policy_record_* em um unico ponto de entrada seguro com codigos USERDB_AUTH_OK/FAILED/LOCKED expostos em auth/user.h. system_setup login passa a consumir o wrapper, deduplicando o trio check/auth/record. Makefile TEST_SRCS teve typo corrigido (src/driverslogin_window_gui_layout.c src/auth//net/net_probe.c -> src/drivers/net/net_probe.c) que impedia o build de testes host-side. Testes contratuais para USERDB_AUTH_* adicionados em test_auth_policy.c."
      - version: 0.8.0-alpha.206+20260513
        date: 2026-05-13
        summary: "Hardening Etapa 2: userdb_authenticate passa a usar crypt_constant_time_compare, zera locais sensiveis antes de retornar e config_log_user_record_state deixa de imprimir salt/hash no log de bootstrap (substituidos por marcadores redigidos com tamanho/presenca). Cobertura estatica nova em test_crypt_vectors valida a semantica de comparacao em tempo constante. Nenhum efeito grafico, IO bloqueante ou alteracao de comportamento funcional foi introduzido."
