    extended: 0.8.0-alpha.242+20260520
    stability: experimental
    current_summary: "Corrige o fluxo de download do indice de modulos via redirect em GitHub Releases, preserva staging de payload em /var/capypkg/updates para inspecao apos falha e torna o bootstrap remoto do primeiro boot resiliente ao link latest/download."
    summary: "Header-managed encrypted volumes em producao (write-side + read-side) via novo modulo `src/security/volume_provider.{c,h}` (~280 LOC + ~145 LOC) + 9 funcoes de teste host-side (~430 LOC, ram-backed block device end-to-end). ANTES (alpha.221): primitiva on-disk `capyos_volume_header_*` entregue e testada isoladamente em host runner, mas dormente em producao — installer continuava gravando filesystem CAPYFS direto no LBA 0 raw da particao DATA, kernel continuava derivando AES-XTS keys via PBKDF2-SHA256(16000 iter) sobre `g_disk_salt` hardcoded de 16 bytes 'NoirOS-FS-Salt!' compartilhado entre todas as instalacoes do mundo, primitiva `crypt_derive_xts_keys_argon2id` (alpha.220) sem caller real. AGORA: `volume_provider_install` (write-side, called pelo `initialize_encrypted_data_volume` no PRIMEIRO BOOT pos-install ISO) gera salt 16-byte CSPRNG per-install, popula header v1 com Argon2id (t_cost=3, m_cost=8192 KiB = 8 MiB de scratch), deriva keys via `crypt_derive_xts_keys_argon2id`, computa `kdf_check_tag` HMAC-SHA256 + finaliza CRC32, escreve buffer 4 KiB no LBA 0 do chunked device (struct 512B + 3584B zero padding cumprindo a invariante reserved-all-zero do parser), cria offset wrapper a partir do LBA 1 (FS area), `crypt_init` retorna crypt_dev pronto para mount. `volume_provider_open` (read-side, called pelo `open_crypt_volume_with_password` em todos os boots subsequentes) le LBA 0, executa `capyos_volume_header_looks_valid` como quick gate barato, se passa entra no header path autoritario (parse + derive_keys via header + offset_wrap + crypt_init) SEM fallback legacy em falha de auth (downgrade protection — atacante que reescreve header com lixo nao consegue forcar PBKDF2 path), se nao passa entra no legacy path (PBKDF2 + g_disk_salt + crypt_init sobre full device) preservando 100% dos volumes pre-alpha.222. Volumes pre-alpha.222 continuam funcionando porque o boot path detecta ausencia de header magic 'CAPYVHDR' (probabilidade de ciphertext legacy aleatorio passar magic+CRC ~2^-96) e cai no PBKDF2 + g_disk_salt + crypt_init sobre full device. Modificacoes minimas (3 arquivos kernel side): `src/arch/x86_64/kernel_volume_runtime/key_storage_probe.c` substitui crypt_derive_xts_keys + crypt_init direto por chamada a `volume_provider_open`; `src/arch/x86_64/kernel_volume_runtime/mount_initialize.c::initialize_encrypted_data_volume` substitui `open_crypt_volume_with_password` por `volume_provider_install` no caminho de install fresh; `Makefile` adiciona volume_provider.o em CAPYOS64_OBJS apos volume_header.o. Tests `tests/test_volume_provider.c` (~430 LOC, 9 funcoes / ~50 assertions): install grava magic CAPYVHDR + padding zero + parse field-by-field; install+open round-trip preservando plaintext sob AES-XTS; wrong password fails clean com out_crypt nullified (sentinela 0xDEADBEEF zeroed); legacy volume mount sem header via PBKDF2 fallback round-trips; downgrade attack rejeitado (header presente forca header path, mesmo com legacy params supplied); fail-closed em NULL inputs, block_size errado, device tiny (<2 blocks); I/O failure no header LBA refusa mount; dois installs no mesmo password produzem salts distintos (CSPRNG variability). Wiring `Makefile` TEST_SRCS + `test_runner.c` declara/invoca run_volume_provider_tests. Caminho legacy preservado integralmente — nenhum volume CapyOS existente quebra com este upgrade. ABI publica preservada — duas funcoes novas (`volume_provider_install`, `volume_provider_open`) sao aditivas; key_storage_probe.c::open_crypt_volume_with_password mantem assinatura externa (apenas o corpo muda). 4 callsites de g_disk_salt continuam existindo como fallback legacy (`installer_main.c` legacy 32-bit aposentado nao tocado nesta release). `alpha.221` entregou: on-disk volume header module (`src/security/volume_header.{c,h}` ~620 LOC + ~290 LOC) com algorithm marker + per-volume random salt + HMAC-SHA256 check tag. ANTES (estado em alpha.220): toda instalacao CapyOS gravava o filesystem CAPYFS comecando no LBA 0 raw da particao DATA, com chaves AES-XTS derivadas implicitamente via PBKDF2-SHA256(16000 iter) sobre `g_disk_salt` = 'NoirOS-FS-Salt!' (16 bytes hardcoded em `installer_main.c:39-41` e replicado por valor em `kernel_runtime_ops.c:287`, `key_storage_probe.c:75`, `kernel.c:392`). Tres problemas residuais documentados nos Limites de alpha.218 e alpha.220: (1) volume key continua PBKDF2 sem memory-hardness, atacante com disco roubado paga speedup GPU/ASIC tipico >10000x sobre CPU para brute-force offline; (2) salt nao e per-install, rainbow tables pre-computadas contra 'NoirOS-FS-Salt!' acelerariam ataque contra qualquer instalacao CapyOS simultaneamente; (3) primitiva `crypt_derive_xts_keys_argon2id` entregue em alpha.220 ficou sem caller real porque mudar o KDF sem header on-disk quebra a leitura de qualquer volume existente (kernel novo deriva chave diferente => decifra basura). AGORA: include/security/volume_header.h define struct on-disk fixa de 512 bytes — magic 'CAPYVHDR' little-endian (2 u32: 0x59504143/0x52444856), version u32, flags u32 reservado, kdf_algo_id u32 (PBKDF2_SHA256=0 ou ARGON2ID=1), kdf_t_cost u32 (iteracoes PBKDF2 ou t_cost Argon2id), kdf_m_cost u32 (KiB para Argon2id, 0 para PBKDF2), kdf_salt_len u32, kdf_salt[64] zero-padded apos salt_len, data_offset_lba u32 (>=1, onde FS comeca), reserved_lba_count u32 (1 em v1), kdf_check_tag[32] (HMAC-SHA256(key1||key2, 'CAPYOS-VOL-HDR-CHECK-v1' || prefix[0..104])), creation_timestamp_ns u64 forense, creator_version[32] ('CapyOS-0.8.0-alpha.221' null-padded), reserved[332] zerado, header_crc32 u32 (IEEE 802.3 reflected, polynomial 0xEDB88320, init/post-xor 0xFFFFFFFF, no-table implementacao branchless ~10 LOC). src/security/volume_header.c implementa: vh_serialize_prefix (autoridade unica do layout dos primeiros 104 bytes — usado por _serialize e por vh_compute_tag_internal para impedir drift), vh_put/get_u32_le e u64_le (endianness explicita), vh_const_eq (constant-time compare local — evita coupling cross-unit), capyos_volume_header_crc32 (no-table branchless mask = -(int32_t)(crc&1u)), vh_validate_params (PBKDF2: t_cost>=1000 piso de sanidade e m_cost==0 strict — rejeita downgrade tampered para t_cost trivial; Argon2id: t_cost>=1, m_cost>=8 RFC 9106 §3.1; salt_len em [8,64]; data_offset_lba>=1; reserved_lba_count em [1, data_offset_lba]). APIs publicas: capyos_volume_header_init (popula struct com params validados + salt copiado + creator_version null-padded, deixa check_tag zero para o caller computar pos-derivacao); capyos_volume_header_compute_check_tag (HMAC sobre context_label||prefix[0..104] com key1||key2 64-byte, mirror em hdr->kdf_check_tag); capyos_volume_header_verify_check_tag (recomputa expected + crypt_constant_time_compare via vh_const_eq); capyos_volume_header_finalize_crc; capyos_volume_header_serialize (zera buf, escreve prefix + tag + timestamp + creator_version + reserved + CRC); capyos_volume_header_parse (valida CRC + magic + version primeiro = barato, depois flags==0 + params + reserved-all-zero, popula struct com wipe-first-fail-safe); capyos_volume_header_looks_valid (gate barato magic+version+CRC para boot path decidir 'modern vs legacy' sem pagar Argon2id); capyos_volume_header_derive_keys (DISPATCHER: wipe key1/key2 first, valida params, executa crypt_derive_xts_keys ou crypt_derive_xts_keys_argon2id conforme algo_id, depois verify_check_tag, wipe em qualquer falha — caller que esquece return code lida com sentinela zero, nao com stack residue). Threat model two-tier documentado inline: header_crc32 e fast bit-rot gate NAO seguranca (atacante recomputa trivialmente); kdf_check_tag e o binding criptografico (HMAC sob keys derivadas dos params declarados — atacante que altera salt/algo/t_cost/m_cost forca user a derivar chave diferente, recomputo do HMAC nao bate com tag stored, mount recusa). Boot path NAO distingue 'wrong password' de 'tampered header' no retorno publico — ambos sao ERR_CHECK_TAG — para nao gerar oracle de tampering distinguivel da experiencia normal de senha errada. Tests host-side novos em tests/test_volume_header.c (13 funcoes, ~70 assertions): CRC32 known-answer (vetores RFC 3309 '', 'a' -> 0xE8B7BE43, '123456789' -> 0xCBF43926 + NULL guard + zero-buffer no-null-stop check); init happy paths PBKDF2 e Argon2id (verifica magic/version/algo/t/m/salt_len/salt-bytes/salt-tail-zero/data_offset/reserved_lba/check_tag-zero/timestamp/creator_version/creator-null-pad/reserved-all-zero); init fail-closed 13 vetores (NULL out, NULL salt, algo desconhecido, pbkdf2 t<1000, pbkdf2 m!=0, argon2 t=0, argon2 m<8, salt<8, salt>64, data_offset=0, reserved=0, reserved>data_offset); serialize/parse roundtrip com endianness explicit (bytes 0..7 lidos diretamente como ASCII 'CAPYVHDR'); parse fail-closed (NULL inputs, magic-tampered-with-fixed-CRC -> ERR_MAGIC, version-tampered-with-fixed-CRC -> ERR_VERSION, body-tampered-no-CRC-fix -> ERR_CRC, algo-tampered-fixed-CRC -> ERR_ALGO, flags-nonzero -> ERR_FLAGS, reserved-nonzero -> ERR_RESERVED); looks_valid quick gate (valid -> 1, corrupt -> 0, NULL -> 0, all-zero -> 0); derive_keys success em ambos PBKDF2 e Argon2id (verifica que dispatcher produz mesmas keys que crypt_derive_xts_keys{,_argon2id} direto, k1!=k2 anti-split-bug); derive wrong password -> ERR_CHECK_TAG com k1/k2 wiped a zero a partir de sentinela 0xA5; tampered salt detectado mesmo com password correto (1-byte flip no salt -> keys diferentes -> HMAC mismatch); algo downgrade attempt (header Argon2id legitimo + tag computed; atacante reescreve algo=PBKDF2 + t_cost=1000 + m_cost=0 -> dispatcher passa o param validator mas a derivacao PBKDF2 produz keys diferentes da derivacao Argon2id original -> ERR_CHECK_TAG); fail-closed NULL hdr/pwd/k1/k2 com sentinela wipe verificada. Wiring: Makefile adiciona $(BUILD)/x86_64/security/volume_header.o em CAPYOS64_OBJS apos crypt.o; TEST_SRCS inclui tests/test_volume_header.c + src/security/volume_header.c; test_runner.c declara e chama run_volume_header_tests apos run_crypt_vector_tests. NAO altera installer nem boot path nesta release (alpha.222 wira o consumo); legacy volumes CONTINUAM funcionando porque nada le o header ainda. Composicao integral com alpha.220 (crypt_derive_xts_keys_argon2id e o backend Argon2id), alpha.218 (argon2id_hash primitiva), alpha.214 (CSPRNG fornecera salt em alpha.222), alpha.213 (HKDF ortogonal), alpha.209 (sha256_clear hygiene em crypt_hmac_sha256 propaga para vh_compute_tag_internal). ABI publica preservada — todos os simbolos novos sao aditivos."
  history:
      - version: 0.8.0-alpha.242+20260520
        date: 2026-05-20
        summary: "GitHub Release redirect handling e staging de capypkg endurecidos: http_response passa a guardar o Location integral, HTTP_MAX_URL/HTTP_MAX_PATH sobem para 2048, req/next_url/resolved saem da stack para kmalloc e capypkg_install passa a manter payloads rejeitados em /var/capypkg/updates antes do commit. Isso corrige o HTTP_ERR_RECV visto no redirect duplo de /releases/latest/download/ e deixa o bootstrap remoto do primeiro boot diagnosticavel quando o asset final do GitHub vem com SAS/JWT longo demais."
      - version: 0.8.0-alpha.241+20260519
