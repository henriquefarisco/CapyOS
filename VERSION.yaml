meta:
  generated: 2025-12-11
  maintainer: Henrique
  description: "Canalização oficial de versões do NoirOS segundo o fluxo gitflow"
channels:
  alpha:
    current: 0.7.3-alpha.0
    extended: 0.7.3-alpha.0+20251215
    stability: experimental
    summary: "Hotkey de help, comandos de energia, escolha de layout na instalação e correções do ABNT2 / boot seguro"
    history:
      - version: 0.7.3-alpha.0
        date: 2025-12-15
        commit: 6a9c3c2
        changes:
          - "Correção do layout BR-ABNT2 (dead keys, tecla /? e keypad decimal), com testes adicionais de scancode."
          - "Hotkey F1 injeta help-docs no CLI; instalador pergunta layout antes de senhas."
          - "Comandos shutdown-reboot e shutdown-off com sync de buffers."
          - "Boot principal exige NoirFS montado de forma cifrada; remove prompt inseguro."
      - version: 0.7.2-alpha.0
        date: 2025-12-11
        commit: 5f08d60
        changes:
          - "Kernel principal monta a partição 2 (MBR) com blocos de 4096B e remove qualquer tentativa de formatação interna."
          - "Instalador NGIS valida tamanho mínimo, tipos de partição e faixa LBA; cria particionamento BOOT/DADOS com padrão seguro (BOOT 32MiB por padrão, disco 128MiB sugerido)."
          - "Wrapper de offset e parser MBR recusam ranges inválidos, evitando corrupção ao montar a partição 2."
          - "Pilha do kernel/instalador ampliada para 16 KiB, mitigando overflow em operações de instalação."
          - "Alvo 'make test' com testes unitários para wrappers de bloco e parsing do MBR (host)."
      - version: 0.7.1-alpha.1
        date: 2025-10-10
        commit: f2e06f4
        changes:
          - "Bloqueia login de usuário quando senha do NoirFS está incorreta (loop de autenticação)"
          - "Impede reformatar volume existente; formata somente em mídia vazia"
          - "Fluxo de primeiro uso: criação e confirmação de senha do volume"
          - "Validação do acesso a /etc/users.db antes do prompt de login (telemetria de saúde)"
      - version: 0.7.0-alpha.1
        date: 2024-05-26
        commit: 048b96f
        changes:
          - "Shell segmentado por categorias com registro dinâmico de comandos"
          - "Drivers de teclado com layouts desacoplados (US, BR-ABNT2)"
          - "Reorganização completa das pastas em arquitetura modular"
      - version: 0.6.9-alpha.5
        date: 2024-04-30
        summary: "Melhorias no sistema de arquivos NoirFS e testes iniciais de sessão"
      - version: 0.6.4-alpha.2
        date: 2024-03-12
        summary: "Introdução do NoirCLI com comandos básicos de usuário"
  beta:
    current: 0.6.2-beta.3
    extended: 0.6.2-beta.3+20240401
    stability: preview
    history:
      - version: 0.6.2-beta.3
        date: 2024-04-01
        summary: "Melhorias de estabilidade no NoirFS e sincronização de buffers"
      - version: 0.6.0-beta.1
        date: 2024-02-18
        summary: "Primeira build beta com suporte a múltiplos usuários"
  stable:
    current: 0.5.4
    extended: 0.5.4+20240110
    stability: production
    history:
      - version: 0.5.4
        date: 2024-01-10
        summary: "Fixes no bootloader e melhorias de console"
      - version: 0.5.0
        date: 2023-12-05
        summary: "Release inicial estável com shell simples"
