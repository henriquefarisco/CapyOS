      - version: 0.8.0-alpha.222+20260514
        date: 2026-05-14
        summary: "Header-managed encrypted volumes em producao via volume_provider (`include/security/volume_provider.h` + `src/security/volume_provider.c` ~145 + ~280 LOC) + 9 funcoes de teste host-side (`tests/test_volume_provider.c` ~430 LOC). ANTES (alpha.221): primitiva on-disk `capyos_volume_header_*` entregue e testada isoladamente em host runner mas DORMENTE em producao — installer/boot continuavam usando crypt_derive_xts_keys PBKDF2-SHA256(16000) sobre g_disk_salt 'NoirOS-FS-Salt!' hardcoded compartilhado entre TODAS as instalacoes CapyOS do mundo, primitiva crypt_derive_xts_keys_argon2id (alpha.220) sem caller real, gap conhecido nos Limites de alpha.221 documentado como 'alpha.222 planned: installer writes header on fresh installs; boot path tries header first, falls back to legacy PBKDF2 + g_disk_salt for existing volumes'. AGORA: volume_provider_install (write-side, called pelo initialize_encrypted_data_volume no PRIMEIRO BOOT pos-install ISO) gera salt 16-byte fresco via csprng_get_bytes per-install, popula header v1 com Argon2id (t_cost=CRYPT_VOLUME_ARGON2ID_T_COST=3, m_cost=CRYPT_VOLUME_ARGON2ID_M_COST=8192 KiB = 8 MiB de scratch), deriva AES-XTS keys via crypt_derive_xts_keys_argon2id, computa kdf_check_tag HMAC-SHA256 + finaliza CRC32 IEEE 802.3, serializa header em buffer 512B, escreve em chunked_4096[0] como block 4 KiB (struct 512B + 3584B zero padding cumprindo invariante reserved-all-zero do parser), block_offset_wrap(chunked_4096, hdr.data_offset_lba=1, count-1) cria fs_dev a partir do bloco 1 (FS area), crypt_init(fs_dev, k1, k2) wrappa fs_dev com AES-XTS retornando crypt_dev pronto para mount via mount_root_capyfs. volume_provider_open (read-side, called pelo open_crypt_volume_with_password em todos os boots subsequentes incluindo o segundo boot apos install fresh): le chunked_4096[0], executa capyos_volume_header_looks_valid como quick gate barato (~10000 ciclos CRC32 sobre 4 KiB), se passa entra no header path AUTORITARIO (parse + capyos_volume_header_derive_keys + offset_wrap + crypt_init) SEM fallback legacy em qualquer falha downstream (parse/derive/tag-mismatch) — downgrade protection contra atacante que reescreve header com lixo nao consegue forcar caller a usar PBKDF2 (provider retorna -1 + out_crypt=NULL e wipa scratch local antes de retornar); se looks_valid falha entra no LEGACY PATH (crypt_derive_xts_keys PBKDF2 + caller-supplied legacy_salt/legacy_iter + crypt_init sobre full chunked_4096 device) preservando 100% dos volumes pre-alpha.222 — atacante com instalacao legacy continua autenticando como antes, e atacante com ciphertext legacy aleatorio no LBA 0 tem probabilidade ~2^-96 de satisfazer magic CAPYVHDR + version + CRC32 quase zero. Modificacoes minimas em 3 arquivos kernel-side: src/arch/x86_64/kernel_volume_runtime/key_storage_probe.c::open_crypt_volume_with_password substitui crypt_derive_xts_keys + crypt_init direto por volume_provider_open(data_dev, password, state->disk_salt, state->disk_salt_size, state->kdf_iterations, &crypt_dev) preservando assinatura externa publica; src/arch/x86_64/kernel_volume_runtime/mount_initialize.c::initialize_encrypted_data_volume substitui open_crypt_volume_with_password por volume_provider_install(data_dev, state->active_volume_key, &crypt_dev) no caminho de install fresh (device_is_blank == 1); Makefile adiciona $(BUILD)/x86_64/security/volume_provider.o em CAPYOS64_OBJS imediatamente apos volume_header.o + TEST_SRCS ganha tests/test_volume_provider.c src/security/volume_provider.c; test_runner.c declara run_volume_provider_tests + invocacao apos run_volume_header_tests. Tests: 9 funcoes / ~50 assertions cobrindo (1) install grava magic CAPYVHDR + padding zero apos 512B + parse field-by-field dos defaults (algo=Argon2id, t_cost=3, m_cost=8192, data_offset_lba=1) + crypt_dev->block_count = raw_count - 1, (2) install + open round-trip preserva plaintext atraves de AES-XTS encrypt/decrypt em LBA 0 da FS area (raw LBA 1) com assertion explicita de que raw LBA 1 difere de plaintext, (3) wrong password retorna -1 com out_crypt nullified de sentinela 0xDEADBEEF, (4) legacy volume mount sem header via PBKDF2 fallback round-trips plaintext e crypt_dev cobre full device (block_count == raw_count), (5) downgrade attack rejeitado — header presente forca header path mesmo com legacy_salt + legacy_iter supplied, wrong password ainda falha sem cair em legacy, (6) install fail-closed em NULL device/password/out + block_size=512 + tiny device (1 block), (7) open fail-closed em NULL inputs + legacy params ausentes quando sem header, (8) I/O failure forcada no LBA 0 (force_read_fail_lba=0) refusa mount sem cair em legacy, (9) dois installs com mesma password produzem salts distintos (CSPRNG variability — probabilidade de colisao 2^-128). Backend de teste: ram_dev calloc-backed com block_read/write_fn opcionalmente forcando falha em LBA especifico — 100% host-side, zero dependencia de driver real ou kernel runtime. Limites residuais (rolling): (i) 4 callsites de g_disk_salt continuam existindo como fallback legacy — src/core/kernel.c (32-bit legacy aposentado), src/installer/installer_main.c (32-bit aposentado), src/arch/x86_64/kernel_runtime_ops.c (state initializer ainda passa g_disk_salt para o struct runtime), src/arch/x86_64/kernel_volume_runtime/key_storage_probe.c (consumido pelo legacy fallback path do provider) — todos serao removidos quando a re-keying tool de alpha.223 (planejada) converter volumes legacy em header-managed in-place; (ii) installer 32-bit (src/installer/installer_main.c) nao foi tocado nesta release porque o target esta em legacy-disabled (linha 1105-1106 do Makefile) e nao constroi mais em ISO builds — modernizacao futura podera adicionar volume_provider_install la se o target for revivido; (iii) re-keying tool ainda nao entregue — usuarios em volumes legacy permanecem em PBKDF2 ate executar futura ferramenta `capyfs rekey`. ABI publica preservada: duas funcoes novas (volume_provider_install/volume_provider_open) sao aditivas; open_crypt_volume_with_password mantem assinatura externa (apenas corpo muda). Composicao com slices anteriores integral: alpha.221 (volume_header primitive consumida diretamente), alpha.220 (crypt_derive_xts_keys_argon2id finalmente em producao com caller real), alpha.214 (csprng_get_bytes per-install salt), alpha.218 (Argon2id memory-hard usado para volume key derivation), alpha.213 (HKDF ortogonal — serve outros derivative contexts), alpha.215 (ChaCha20-Poly1305 ortogonal — serve secure messaging fora de TLS)."
      - version: 0.8.0-alpha.221+20260514
        date: 2026-05-14
        summary: "On-disk volume header module (`include/security/volume_header.h` + `src/security/volume_header.c` ~290 + ~620 LOC) com algorithm marker + per-volume random salt + HMAC-SHA256 check tag + CRC32 fast bit-rot gate. ANTES (estado em alpha.220): instalacoes CapyOS gravavam filesystem CAPYFS comecando no LBA 0 raw da particao DATA com chaves AES-XTS derivadas via PBKDF2-SHA256(16000) sobre `g_disk_salt` hardcoded em quatro callsites (installer_main.c, kernel_runtime_ops.c, key_storage_probe.c, kernel.c). Tres limites residuais documentados nos Limites de alpha.218 (volume key continua PBKDF2 sem memory-hardness) e alpha.220 (primitiva crypt_derive_xts_keys_argon2id entregue mas sem caller real porque mudar o KDF sem header on-disk quebra a leitura de qualquer volume existente): atacante com disco roubado offline brute-forcava com speedup GPU/ASIC >10000x sobre CPU; salt fixo permite rainbow tables compartilhadas entre todas as instalacoes; primitiva Argon2id de alpha.220 ficou unconsumed. AGORA: define struct on-disk fixa de 512 bytes - magic 'CAPYVHDR', version, flags, kdf_algo_id (PBKDF2/Argon2id), t_cost, m_cost, salt_len, kdf_salt[64], data_offset_lba (>=1), reserved_lba_count, kdf_check_tag[32] (HMAC-SHA256(K1||K2, context||prefix[0..104])), creation_timestamp_ns, creator_version[32], reserved[332], header_crc32 (IEEE 802.3 reflected). Implementacao tem (a) layout authority em vh_serialize_prefix usado tanto pelo serializer quanto pelo HMAC tag computation - impede drift entre o que vai a disco e o que e autenticado pelo tag; (b) endianness little-endian explicito via byte stores (portabilidade host-side test sobre big-endian); (c) CRC32 no-table branchless 10 LOC; (d) vh_validate_params strict (PBKDF2: t_cost>=1000 e m_cost==0 strict; Argon2id: t_cost>=1, m_cost>=8 RFC 9106 §3.1; salt_len em [8,64]; data_offset_lba>=1; reserved_lba_count em [1, data_offset_lba]); (e) parse fail-safe que wipea out struct ANTES de qualquer validacao + verifica CRC -> magic -> version (barato) ANTES de params + reserved (caro). Threat model two-tier: header_crc32 e bit-rot gate fast NAO seguranca; kdf_check_tag e binding criptografico - atacante que altera salt/algo/t_cost/m_cost forca user a derivar chave diferente e o recomputo do HMAC nao bate. derive_keys dispatcher fail-closed first (wipe key1/key2 antes de parameter check), valida params, dispatcha PBKDF2 ou Argon2id, verifica tag, wipe em qualquer falha. NAO distingue 'wrong password' de 'tampered header' no retorno (ambos ERR_CHECK_TAG) - evita oracle. Tests host-side em tests/test_volume_header.c: 13 funcoes ~70 assertions cobrindo CRC32 RFC 3309 KAT, init happy paths PBKDF2 e Argon2id, init fail-closed 13 vetores, serialize/parse roundtrip com endianness explicit (bytes 0..7 -> 'CAPYVHDR'), parse fail-closed (magic/version/CRC/algo/flags/reserved tampered), looks_valid quick gate, derive success em ambos KDFs com k1!=k2 anti-split, wrong password com sentinela 0xA5 wipe, tampered salt detectado mesmo com password correto, algo downgrade attempt (header Argon2id + tag pre-computed; atacante reescreve para PBKDF2 minimo -> derivacao produz chave diferente -> HMAC mismatch). Wiring: Makefile CAPYOS64_OBJS + TEST_SRCS, test_runner.c. NAO altera installer/boot path nesta release - alpha.222 fara o write-side wiring; legacy volumes continuam funcionando porque nada le o header ainda. Composicao com alpha.220 (crypt_derive_xts_keys_argon2id backend), alpha.218 (argon2id_hash), alpha.214 (CSPRNG futuro), alpha.209 (sha256_clear hygiene propaga via crypt_hmac_sha256). ABI publica preservada - todos os simbolos novos sao aditivos. Mapa de entrega: ALPHA.221 (esta release) -> primitiva entregue, testada, audit-friendly. ALPHA.222 (planejado) -> installer escreve header no LBA 0 raw + filesystem em LBA 1+ via block_offset_wrap, boot path tenta header read primeiro + fallback para legacy PBKDF2 + g_disk_salt em volumes pre-alpha.222. ALPHA.223 (planejado) -> ferramenta de re-keying para upgrade in-place de volumes legacy."
      - version: 0.8.0-alpha.220+20260514
        date: 2026-05-14
        summary: "Implicit re-hash on successful auth + Argon2id volume-key derivation primitive. ANTES (estado em alpha.219): toda conta criada ou que trocou senha desde alpha.219 ja saia com Argon2id memory-hard, mas contas legadas hashed com PBKDF2-SHA256 antes do rollout continuavam usando PBKDF2 — userdb_authenticate dispatcha por algo_id, entao autenticavam corretamente, MAS o caminho legacy completa em ~50 ms (PBKDF2 64000 iter) enquanto o caminho moderno completa em ~200 ms (Argon2id t=3, m=8192 KiB). Atacante observando latencia de login distinguia 'conta predates alpha.219 deployment e nunca trocou senha' vs 'conta Argon2id'. Vazamento minimo (nao revela senha, nao revela existencia, apenas idade aproximada da ultima troca) mas residual conhecido — documentado em alpha.219 Limites como 'slice futuro de implicit re-hash on successful auth'. Adicionalmente, crypt_derive_xts_keys (AES-XTS volume key derivation em src/installer/installer_main.c, src/arch/x86_64/kernel_volume_runtime/key_storage_probe.c, src/core/kernel.c) continuava em PBKDF2-SHA256 — gap conhecido de alpha.218 ('Volume key derivation continua PBKDF2-SHA256. Threat model diferente — migracao para Argon2id e slice futuro de menor prioridade'). Atacante com disco roubado offline brute-forcava volume password com speedup GPU >10000x sobre CPU. AGORA: src/auth/user.c refatorado. userdb_set_password (entry publico) extrai toda a logica de read-modify-write para nova helper privada userdb_replace_password_hash; o policy check (auth_policy_validate_password) permanece em userdb_set_password e nao e replicado no helper. userdb_authenticate, depois de auth_ok=1 com user_found e rec.algo_id != USER_PASSWORD_ALGO_ARGON2ID, chama (void)userdb_replace_password_hash(username, password) — re-deriva com Argon2id (USER_ARGON2ID_T_COST=3, USER_ARGON2ID_M_COST=8192 KiB), gera salt fresco via csprng_get_bytes(16) per RFC 9106 §3.1, persiste com serialize_user_record_line escolhendo 10-field schema. Failure fail-silent (allocation failure ou FS error nao bloqueia auth ja bem-sucedida; record stays on PBKDF2 e retry no proximo login). Threat model: timing leak residual self-heals — population de PBKDF2 records shrinks monotonically conforme contas autenticam; leak residual restrito a 'conta predates alpha.220 AND has not been used yet'. Composicao com alpha.219 (Argon2id em userdb) integral, alpha.218 (Argon2id primitiva) integral, alpha.214 (CSPRNG) preservada, alpha.212 (timing-equalised lockout) preservada, alpha.207 (userdb_authenticate_with_policy wrapper) preservada — o wrapper de policy continua chamando userdb_authenticate antes do allowed check. Volume key primitive: include/security/crypt.h adiciona crypt_derive_xts_keys_argon2id(password, salt, salt_len, t_cost, m_cost, key1[32], key2[32]) + constantes CRYPT_VOLUME_ARGON2ID_T_COST=3 / CRYPT_VOLUME_ARGON2ID_M_COST=8192 (mesma tuning que userdb, reaproveita o budget de 8 MiB do kernel heap). src/security/crypt.c implementa: caller-allocates pattern via kalloc(m_cost*1024), argon2id_hash com out_len=64, split em key1 (primeiros 32 bytes) + key2 (ultimos 32 bytes) para AES-XTS data/tweak key schedule, wipe volatile-safe do work memory antes de kfree, wipe do scratch derived[64] antes de retornar. Fail-closed first pattern: key1 e key2 wipeados a zero no inicio para que caller que esqueca de checar return code receba sentinela 'no key' inequivoco; rejeicao de t_cost<1, m_cost<8, salt_len<8 per RFC 9106 §3.1. Os callers em producao (installer, key_storage_probe, kernel.c) continuam em PBKDF2 — primitive entregue mas nao consumida ainda, aguardando design do header de volume com algorithm marker para enable backward-compat. Testes host-side adicionados: tests/test_crypt_vectors.c::test_crypt_derive_xts_keys_argon2id (deterministico, key1 != key2 split, salt sensitivity, fail-closed em NULL password/salt/key1/key2/t_cost=0/m_cost=7/salt_len=7, non-collision com PBKDF2). ABI publica: nenhuma quebra; struct user_record formato preservado integral; signature de userdb_authenticate/userdb_set_password identica; crypt_derive_xts_keys signature preservada. Impacto: contas legadas migram transparentemente no proximo login (zero acao do usuario); primitive de volume Argon2id disponivel para installer/volume-creation tools futuros sem rebuild do kernel." userdb_authenticate dispatcha conforme algo_id do registro (PBKDF2 legacy continua aceito sem migracao de DB; salt do usuario desconhecido roda Argon2id com USER_ARGON2ID_T_COST/M_COST para equalizacao de timing com a nova baseline). Schema /etc/users.db ganha trailer opcional `:argon2id:t_cost:m_cost` (10 campos para Argon2id, 7 campos para PBKDF2 legacy — parser aceita ambos, serializer escolhe por algo_id). Argon2id work memory (8 MiB) alocado via kalloc, wipeado volatile-safe e liberado a cada derivacao; fail-closed em allocation failure, parametros invalidos, NULL pointers — hash_out wipeado a zero em todos os caminhos de erro para nao envenenar comparacao constant-time downstream. Testes host-side novos em tests/test_user_password_hash.c (run_user_password_hash_tests): algo_to_string/from_string canonico, round-trip PBKDF2 legacy com t_cost=0 mapeando para USER_ITERATIONS, round-trip Argon2id, sensibilidade a salt/t_cost/m_cost (anti-regressao de parameter threading), fail-closed em NULL password/salt/out, t_cost=0/m_cost<8, algo_id desconhecido, stored hash > scratch 64-byte. Composicao com alpha.218 (Argon2id primitiva) integral. Composicao com alpha.214 (CSPRNG) preservada — salt continua gerado via csprng_get_bytes 16 bytes per RFC 9106 §3.1. ABI publica preservada para callers existentes: struct user_record cresce 9 bytes no final (algo_id+t_cost+m_cost) — todos os 27 callsites de struct user_record (apps/settings, desktop, file_manager, shell, vfs, privilege) so leem username/uid/gid/home/role e compilam sem mudanca. Argon2id primitiva (alpha.218) continua disponivel para futuros usos fora do userdb (key wrapping para AES-XTS, secure messaging). PBKDF2-SHA256 continua disponivel em crypt.c para volume key derivation (AES-XTS) e legacy compat — esta entrega nao remove nada. Fundacao cripto canonica CapyOS (11 primitivas) agora alimentando login real fim-a-fim, fechando o gap de defesa contra brute-force GPU/ASIC em userdb. Argon2id (RFC 9106) + BLAKE2b (RFC 7693) memory-hard password hashing nativo do CapyOS em src/security/argon2.c e src/security/blake2b.c. Argon2id e o vencedor do Password Hashing Competition (2015) e o algoritmo recomendado por OWASP/NIST SP 800-63B para password hashing — fecha o gap fundamental contra brute-force massivo em GPU/ASIC que ataca PBKDF2-SHA256 (atual default em src/security/crypt.c) com speedup de 1000-10000x. BLAKE2b e a fundacao matematica obrigatoria do Argon2 (RFC 9106 §3.3 H' = BLAKE2b iterado para output de comprimento variavel; pre-hash H0 inicial). APIs publicas: blake2b_init/update/final/wipe (struct blake2b_ctx) + one-shot blake2b(out, outlen, key, keylen, in, inlen) com keyed mode HMAC-like ate 64-byte key, fail-closed em NULL/comprimento invalido, wipe volatile-safe; argon2id_hash(password, password_len, salt, salt_len, t_cost, m_cost, memory, memory_len, out, out_len) com caller-provided memory buffer (sem malloc kernel), parallelism=1 fixo (multi-lane RFC 9106 mas sem caller requerido em CapyOS), tag length 4..2^32, salt minimo 8 bytes per RFC, m_cost em KiB minimo 8 (= 8 KiB de work memory), t_cost minimo 1. Implementacao do zero (~600 LOC src/security/argon2.c + ~270 LOC src/security/blake2b.c) auditavel independente da reference impl: BLAKE2b com IV de SHA-512, sigma permutation 12 rodadas, lazy compression para suporte streaming correto; G compression function 1024-byte com fBlaMka(x,y) = x + y + 2*(x_lo * y_lo) per RFC 9106 §3.6 (acrescenta multiplicacao 32x32->64 que aumenta cost-per-op em ASIC), matrix 8x8 de registers 16-byte, P aplicada row-wise e column-wise; index_alpha com J1^2 mapping para distribuicao nao-uniforme reforcando memory-hardness, start_pos exclude segment corrente em pass > 0, ref_area_size respeitando boundary conditions per pass 0 slice 0 (start_index=2 + pre-gen addr_block); modo Argon2id seleciona data-indep para pass=0 slice<2, data-dep para o resto. Wipe hygiene em H0, blocos intermediarios, address_block, input_block, zero_block, final_block antes do retorno em todos os paths. Tests: 7 funcoes novas em tests/test_crypt_vectors.c (test_blake2b_rfc7693_abc com vetor canonico RFC 7693 Appendix A; test_blake2b_empty/multiblock/streaming_equals_oneshot/variable_output/keyed/fail_closed cobrindo padding, compress lazy, param block; test_argon2id_smoke cobrindo determinismo, sensibilidade a password/salt/t/m/out_len, fail-closed em NULL/parametros invalidos). Build: blake2b.o + argon2.o em CAPYOS64_OBJS (kernel) e blake2b.c + argon2.c em TEST_SRCS (host). ABI nova aditiva preservando todas as primitivas existentes (PBKDF2-SHA256 continua disponivel para backward compatibility com user database antigo)." Update verifier (src/services/update_agent.c) agora aceita manifests assinados com chave canonica em producao — gate criptografico de updates oficialmente OPERACIONAL pela primeira vez. Field arithmetic GF(2^255-19) refatorado em modulo compartilhado include/security/fe25519.h + src/security/fe25519.c (extraido de x25519.c) e agora consumido por X25519 + Ed25519. APIs publicas em include/security/ed25519.h: ed25519_create_keypair (deriva pk/sk de seed 32-byte via SHA-512 + clamping + scalar mult base point); ed25519_sign (RFC 8032 §5.1.6 PureEd25519 deterministico); ed25519_verify (RFC 8032 §5.1.7 com cofator 8). Implementacao: group ops twisted Edwards extended (X:Y:Z:T): ge_dbl (dbl-2008-hwcd 4sq+4mul), ge_add (add-2008-hwcd-3 9mul+7add), ge_neg_p, ge_cmov constant-time. Scalar multiplication double-and-add constant-time (256 doubles + 256 cond-adds, cmov mascarado). Encoding/decoding compressed (32 bytes, y || sign(x) bit): ge_encode com fe_isnegative; ge_decode com sqrt candidate via fe_pow22523 + ED_SQRTM1, canonicality check (re-encode comparison), small-x rejection (x==0 & x_0==1 fail), curve-not-on rejection (v*x^2 != ±u). Scalar arithmetic mod L = 2^252 + 27742317777372353535851937790883648493: sc_reduce64 (reduz 64-byte SHA-512 output via signed 21-bit limbs, cascading multiply-and-add com l_lo = [666643,470296,654183,-997805,136657,-683901]); sc_muladd (a*b+c mod L via mesma representacao); sc_is_canonical (S < L gate constant-time). Constants verificadas contra dalek-cryptography (5x51 limbs): ED_D = -121665/121666; ED_D2 = 2*ED_D; ED_SQRTM1 = 2^((p-1)/4); base point ED_B_{X,Y,T}; ED_L_BYTES = 2^252 + l_lo em LE. Wipe hygiene volatile-safe em todos os fe + ge + scalars + SHA-512 contexts intermediarios. Threat model documentado inline: cofator 8 em verify mandatory per RFC §5.1.7 step 4 ([8]SB == [8]R + [8](kA)) rejeita variantes com torsao; S nao canonico (>= L) rejeita malleability; R decode invalid rejeita pontos fora da curva. Tests: 1 funcao reformulada test_ed25519_failclosed_contract com vetores oficiais RFC 8032 §7.1 (3 vectors: empty/1-byte/2-byte messages com pk/sk/sig derivation + verify accept), tampering rejection (signature bytes 0 e 32 flipados), wrong pk rejection, S=L e S>L canonicality rejection, NULL inputs fail-closed, round-trip create_keypair->sign->verify com 64-byte message, deterministic signing (re-sign produz mesma sig), tamper message rejection. update_agent.c gate de manifest production agora ativo. ABI publica preservada (mesmas 3 funcoes que antes retornavam fail-closed). Composicao com alpha.212 (Ed25519 esqueleto fail-closed) substituida: gate fail-closed -> gate criptografico real."
      - version: 0.8.0-alpha.219+20260514
        date: 2026-05-14
        summary: "Argon2id (RFC 9106) entra em producao no userdb. ANTES (estado em alpha.218): primitiva Argon2id (src/security/argon2.c, ~600 LOC) + BLAKE2b (src/security/blake2b.c, ~270 LOC) ja existiam com KAT cross-checked vs argon2-cffi reference impl, mas src/auth/user.c ainda chamava crypt_pbkdf2_sha256 diretamente em user_record_init/userdb_authenticate/userdb_set_password — toda a fundacao cripto memory-hard ficava sem caller real, e qualquer atacante com acesso offline ao /etc/users.db crackeava senhas fracas em horas usando GPU/ASIC (speedup tipico 1000-10000x sobre CPU para PBKDF2-SHA256). Gap conhecido e documentado em alpha.218 Limites: 'Sem callers reais ainda em userdb'. AGORA: dispatcher novo em src/auth/user_password_hash.{c,h} (~190 LOC + 105 LOC) decoupla user.c das primitivas crypto e isola toda a logica de escolha de algoritmo, alocacao de Argon2id work memory e wipe hygiene em modulo testavel sem VFS/userdb (kalloc do host stub fornece a memoria; nao precisa de kmem.c real). APIs publicas: user_password_hash_algo_to_string/from_string (canonicalizacao dos tokens 'pbkdf2'/'argon2id' para o trailer do users.db), user_password_hash_derive (dispatcha PBKDF2-SHA256 ou Argon2id conforme algo_id, aloca m_cost*1024 bytes via kalloc para Argon2id, wipa work memory antes de kfree, fail-closed wipea hash_out a zero em todos os caminhos de erro), user_password_hash_verify (derivacao + crypt_constant_time_compare em scratch 64-byte capped, wipea scratch antes de retornar). user.h ganha 4 constantes (USER_PASSWORD_ALGO_PBKDF2_SHA256=0, USER_PASSWORD_ALGO_ARGON2ID=1, USER_ARGON2ID_T_COST=3, USER_ARGON2ID_M_COST=8192) e 3 campos novos no FINAL do struct user_record (algo_id, algo_t_cost, algo_m_cost) — append-only para preservar binary layout das primeiras 196 bytes que os 27 callsites existentes leem (apps/settings, desktop, file_manager, shell, vfs, privilege, login_runtime, session). user_record_init agora sempre emite Argon2id com USER_ARGON2ID_T_COST/M_COST (toda conta criada no alpha.219 e em diante ja sai memory-hard). userdb_set_password sempre re-hashea com Argon2id (primeira troca de senha apos upgrade automaticamente promove conta legacy para Argon2id; sem migracao explicita de DB necessaria). userdb_authenticate dispatcha conforme rec.algo_id (PBKDF2 legacy ~50ms vs Argon2id ~200ms; usuario desconhecido roda Argon2id com k_userdb_dummy_salt + USER_ARGON2ID_T_COST/M_COST — equaliza com a nova baseline e mantem mitigacao de user enumeration timing herdada de alpha.206). Leak transicional documentado: PBKDF2 record matched vs Argon2id record matched vazia 'esta conta foi criada/teve senha trocada antes do rollout Argon2id' — nunca a senha em si. Sera eliminado por slice futuro de implicit re-hash on successful auth. Parser de /etc/users.db (parse_user_line) aceita 7 campos (PBKDF2 legacy, sem migracao de DB pre-alpha.219) ou 10 campos (Argon2id: trailer ':argon2id:t_cost:m_cost'); algoritmo desconhecido na posicao 7 rejeita a linha inteira fail-closed (atacante nao downgrade conta forjando algoritmo). serialize_user_record_line escolhe 7 ou 10 campos por algo_id — PBKDF2 legacy preservado no formato antigo permite downgrade transparente sem migracao reversa. Buffer da linha aumentado de +64 para +128 bytes de headroom para acomodar trailer Argon2id com margem. Testes host-side novos em tests/test_user_password_hash.c (run_user_password_hash_tests): algo_to_string/from_string com prefix/suffix collision rejection e NULL guards (8 assertions), PBKDF2 legacy round-trip com t_cost=0 mapeando para USER_ITERATIONS (4 assertions), Argon2id round-trip + nao-colisao com PBKDF2 (5 assertions), sensibilidade parameter threading a salt/t_cost/m_cost para anti-regressao (3 assertions), fail-closed derive com NULL password/salt/out, t_cost=0, m_cost<8, algo desconhecido, zero-len out (7 assertions), fail-closed verify com NULL stored/zero-len/oversize stored (3 assertions). Composicao com alpha.218 (Argon2id primitiva) integral. Composicao com alpha.214 (CSPRNG) preservada — salt continua gerado via csprng_get_bytes 16 bytes per RFC 9106 §3.1. Composicao com alpha.207 (userdb_authenticate_with_policy) preservada — wrapper de lockout/policy continua funcional, agora rodando Argon2id internamente para registros novos. Composicao com alpha.212 (timing-equalised lockout) preservada — wrapper sempre executa userdb_authenticate antes do check policy. Composicao com alpha.206 (dummy salt para non-existent users) preservada — k_userdb_dummy_salt continua valido. Threat model atualizado em comentarios inline de userdb_authenticate (~25 linhas explicam timing leak transicional e plano de eliminacao). Argon2id work memory: 8 MiB por auth (50% do kernel heap 16 MiB) alocado via kalloc, wipeado volatile-safe e liberado a cada derivacao — auth e serializado (sem concorrencia no kernel atual), 16 MiB de heap suporta uma derivacao por vez. ABI publica preservada — struct user_record cresce 9 bytes append-only, todos os callsites compilam unchanged. PBKDF2-SHA256 continua disponivel em crypt.c para volume key derivation (AES-XTS via crypt_derive_xts_keys) e legacy compat — esta entrega nao remove nada. Fundacao cripto canonica CapyOS agora alimentando login real fim-a-fim."
      - version: 0.8.0-alpha.218+20260514
        date: 2026-05-14
        summary: "Argon2id (RFC 9106) + BLAKE2b (RFC 7693) memory-hard password hashing. ANTES (estado em alpha.217): sistema tinha fundacao cripto completa (SHA-256/512, HMAC, PBKDF2-SHA256, HKDF-SHA256, AES-128-XTS, CSPRNG hardened, ChaCha20-Poly1305 AEAD, X25519 ECDH, Ed25519 signature) mas password hashing ainda dependia exclusivamente de PBKDF2-SHA256 — vulneravel a brute-force massivo em GPU/ASIC com speedup tipico de 1000-10000x sobre CPU comum (PBKDF2 nao tem memory-hardness; ASIC pode avaliar milhares de candidates em paralelo). Para login local CapyOS, esse gap permitia que atacante com acesso ao userdb (offline) crackesse passwords fracas em horas. AGORA: implementacao do zero em src/security/blake2b.c (~270 LOC) + src/security/argon2.c (~600 LOC) auditavel independente da reference impl PHC. BLAKE2b (RFC 7693): hash 64-byte com IV de SHA-512, sigma permutation 12 rodadas, lazy compression para streaming correto (compress executa apenas quando ha mais dados pendentes — garante que final block aplica f[0] flag de finalization corretamente), keyed mode HMAC-like (key 0..64 bytes paddado a 128 bytes e absorvido como primeiro bloco per RFC §2.9), param block per RFC §2.5 codificado em h[0] inicial (digest_length, key_length, fanout=1, depth=1). Argon2id (RFC 9106): variante hibrida data-independent (slice 0-1 do pass 0) + data-dependent (resto) — resistencia conjunta a ASIC e a ranking-TMTO. Pre-hash H0 = BLAKE2b(LE32(p) || LE32(T) || LE32(m) || LE32(t) || LE32(version=0x13) || LE32(type=2) || LE32(pwd_len) || pwd || LE32(salt_len) || salt || LE32(0) || LE32(0)). Variable-length H' per §3.3: T<=64 single BLAKE2b call, T>64 chain de r+1 BLAKE2b(64) com cada V_i alimentando proximo + tail V_{r+1} com T-32r bytes. G compression function 1024-byte (128 uint64): R = X XOR Y, view como 8x8 matriz de registers 16-byte, apply P row-wise (8 P calls, cada uma sobre 16 uint64 = uma row) + apply P column-wise (8 P calls), Z = (result) XOR R. P aplica BLAKE2-round-NOMSG com fBlaMka(x,y) = x + y + 2*(x_lo * y_lo) substituindo a soma simples — acrescenta multiplicacao 32x32->64 que aumenta cost-per-op em ASIC dedicado. Address block generation per §3.4.1.1: input_block layout {pass, lane=0, slice, m_prime, t_cost, type=2, counter, zero(968)}, address_block = G(zero, G(zero, input_block)). Index alpha per §3.4.1.2: rel_pos = J1^2 / 2^32 mapeado em ref_area_size via formula nao-uniforme (concentra ref no inicio do reference set), start_pos = (slice+1)*segment_length em pass > 0 (exclui slice corrente). API publica: blake2b_init/update/final/wipe + one-shot blake2b(); argon2id_hash(pwd, pwd_len, salt, salt_len, t_cost, m_cost, memory, memory_len, out, out_len) com caller-provided memory (sem malloc — caller fornece buffer m_cost*1024 bytes via stack/static/heap; flexivel para uso embedded), parallelism=1 fixo (multi-lane fora de escopo desta entrega — RFC 9106 permite explicitamente p=1), sem secret K nem associated data X. Wipe hygiene volatile-safe em todos os intermediarios (H0, V chains do H', blocos prev/ref/new/existing da compressao, input_block, address_block, zero_block, final_block) antes do retorno em sucesso e em todos os paths de erro. Limites: caller-provided memory nao e wipeado automaticamente (caller decide quando — permite reuse em loop); password buffer e responsabilidade do caller. Compatibility: PBKDF2-SHA256 em src/security/crypt.c continua disponivel (userdb existente nao quebra); migracao incremental para Argon2id em userdb sera slice futuro com algorithm prefix nos hashes armazenados. Tests: 8 funcoes novas em tests/test_crypt_vectors.c — test_blake2b_rfc7693_abc (vetor canonico RFC 7693 Appendix A 'abc'), test_blake2b_empty (Python hashlib vetor), test_blake2b_multiblock (fox vetor), test_blake2b_streaming_equals_oneshot (boundary crossing 128 + 256 + tail), test_blake2b_variable_output (outlen 16/32/64 produzem outputs distintos pela inclusao de outlen no param block), test_blake2b_keyed (HMAC-like, keys diferentes -> outputs diferentes), test_blake2b_fail_closed (NULL out, outlen=0, outlen=65, keylen=65, NULL key com keylen>0), test_argon2id_smoke (8 KiB memory, determinismo cross-call, sensibilidade a password/salt/t_cost/m_cost/out_len, empty password OK, fail-closed em NULL salt, salt curto, t_cost=0, m_cost=7, memory_len insuficiente, out_len<4, NULL out, NULL memory). Threat model documentado inline em ambos os headers: BLAKE2b cobre length-extension via f[0] flag + colision resistance 2^256 + preimage 2^512 + indistinguibilidade de PRF quando chaveado; Argon2id cobre brute-force GPU/ASIC via memory wall (m_cost*1024 bytes por candidate test forca <10x speedup mesmo em ASIC dedicado) + TMTO resistance (reducao de memoria por fator k aumenta tempo por k^2 ate sqrt(m_cost)) + side-channel partial (data-independent para metade da primeira pass, data-dependent depois — hibrido). Build: blake2b.o + argon2.o em CAPYOS64_OBJS; blake2b.c + argon2.c em TEST_SRCS. ABI nova aditiva preservando backward compatibility."
      - version: 0.8.0-alpha.217+20260513
