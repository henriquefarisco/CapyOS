        summary: "Higienizacao end-to-end do nucleo + wizard interativo de primeiro boot + comando capy unificado. (1) Sources de desktop session, window manager e apps (gui/desktop/*, gui/window/*, apps/*) migram para CapyUI (escopo expandido para 0.7.0): novo Makefile CapyUI publica DOIS modulos via make package - org.capyos.ui.widget-core (existente) + org.capyos.ui.desktop-session (novo, depends widget-core, empacota src/desktop+src/window+src/apps). Script tools/scripts/migrate_to_capyui.py automatiza a copia + stub de forwarding para o operador rodar fora desta maquina. Headers permanecem em CapyOS/include como contrato compartilhado. (2) Makefile CapyOS adiciona PROFILE flag (full|core-only) + CAPYUI_DIR autodetect via realpath ../CapyUI: build pattern rules capyui-desktop/, capyui-window/, capyui-apps/ compilam de CAPYUI_DIR quando presente, com fallback in-tree quando ausente; PROFILE=core-only zera DESKTOP_OBJS/WINDOW_OBJS/APPS_OBJS e define CAPYOS_PROFILE_CORE_ONLY. (3) Wizard expandido: include/services/capypkg_bootstrap.h ganha enum capypkg_bootstrap_event + typedef capypkg_bootstrap_progress_fn + capypkg_bootstrap_run_with_progress; src/services/install_profile.c ganha install_profile_format (round-trip parse/format, 4 testes novos no host runner); src/config/first_boot/modules.c novo TU implementa first_boot_module_selection_step com TUI BASIC|FULL|CUSTOM, escreve /system/install/profile.ini via install_profile_format, drives capypkg_bootstrap_run_with_progress com callback que renderiza [i/N] na fbcon, chama acpi_reboot ao terminar instalacao bem-sucedida (retorno 1 sinaliza reboot). program.c integra a etapa apos provisionamento do admin. (4) Activation gate: novo include/kernel/module_gate.h + src/kernel/module_gate.c implementa kernel_module_desktop_session_available() e kernel_module_widget_core_available() via stat de /var/capypkg/<name>/installed; extended.c wrappa ensure_desktop e cmd_desktop_start com gate + #ifndef CAPYOS_PROFILE_CORE_ONLY isola gui/desktop/apps headers. (5) Installer UEFI minimalista: src/boot/uefi_loader/installer_run.c retira ~310 linhas de prompts (language, keyboard, hostname, theme, splash, admin user/password, confirmacao com sumario) substituindo por declaracao de defaults + chave de recovery + confirmacao curta; boot_cfg.flags perde BOOT_CONFIG_FLAG_HAS_SETUP_DATA. (6) Comando capy unificado em src/shell/commands/system_control/capy_command.c: subcomandos install/module list/module status/wizard[--modules]/update/help tri-lingua; slot 39 do registry (count 40). (7) Silent provisioning em kernel_shell_runtime.c eliminado (~200 linhas removidas) - sempre delega ao wizard interativo agora; first_boot_setup_impl tambem simplificado. (8) Bump pinning CapyOS->0.8.0-alpha.241+20260519 e CapyUI->0.7.0 nos 7 repos + matrix. NAO inclui loader runtime de modulos (escopo Etapa 12+); desktop ainda linkado no kernel ELF quando PROFILE=full, gate apenas controla activation. NAO fecha Etapas 3-9 do roadmap oficial - este slice e estrutural/UX, nao avanca o gating de runtime."
