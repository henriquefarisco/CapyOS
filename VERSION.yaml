        summary: "Slice 3E.2.B entregue: recoverable retry + reset escalation. `block_device_ops` estendido com `read_block_ex`/`write_block_ex` (retornam class) e `reset(ctx)` opcionais; `block_device_read_ex`/`block_device_write_ex` expostos publicamente. Retry loop em `src/fs/storage/block_device.c` aplica budget per-class: TRANSIENT 3 retries, TIMEOUT 1 retry precedida por `ops->reset`, PERMANENT/DEVICE_GONE/OK sem retry. Reset emitido no maximo uma vez por chamada; se NULL ou falhar TIMEOUT surface como PERMANENT. Fast-path legacy para drivers sem opt-in (ramdisk, efi_block, ata_pio, crypt, offset_wrapper, chunk_wrapper, todos os tests existentes de fs/security/boot) preservado. AHCI: `ahci_exec` refatorado em `ahci_exec_classified` (retorna class), wrapper 0/-1 preservado; `ahci_read_block_ex`/`ahci_write_block_ex` exportam pro block layer; `ahci_port_comreset` segue AHCI 1.3.1 §10.4.2 (port stop, PxSCTL.DET=1, spin, DET=0, wait PxSSTS.DET=3, clear SERR, restart) e atende `ops->reset`. NVMe: `nvme_io_cmd` refatorado em `nvme_io_cmd_classified`; `nvme_block_read_ex`/`nvme_block_write_ex` constroem SQE via `nvme_build_rw_cmd`; `nvme_controller_reset` implementa Controller Level Reset (CC.EN=0 -> wait CSTS.RDY=0 -> CC.EN=1 -> wait CSTS.RDY=1 -> re-prime admin_cq_phase/io_cq_phase/tails). 12 novos host tests em `tests/fs/test_block_retry.c` com mock device de sequencia programavel: immediate OK, TRANSIENT-recovers/exhausts, PERMANENT/DEVICE_GONE no-retry, TIMEOUT-reset+retry, TIMEOUT-no-reset PERMANENT, TIMEOUT-reset-fails PERMANENT, TIMEOUT-followed-by-TIMEOUT (reset 1x then surface), write path same policy, invalid input PERMANENT, legacy driver no overhead. Makefile wira tests/fs/test_block_retry.c + src/fs/storage/block_device.c em TEST_SRCS; test_runner.c registra `run_block_retry_tests`. Zero coordenacao cross-repo: contratos publicos com sister repos preservados; `block_device_ops` extensions sao aditivas; designated initializers garantem zero-init dos novos campos em drivers que nao opt-in. Proximo bloco: Slice 3E.3 (multi-slot AHCI / multi-queue NVMe)."
